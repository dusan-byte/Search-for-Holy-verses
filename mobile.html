<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성구 검색 마스터 v3.0</title>
    <!-- Google Fonts & Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d4af37; /* 황금색 */
            --bg: #fdfdfd;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
            --header-h: 110px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            margin: 0; padding: 0; 
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 프리미엄 헤더 */
        header { 
            background: var(--primary); 
            color: white; 
            padding: 15px 15px 12px; 
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; gap: 10px;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
        .logo span { font-weight: 300; color: var(--accent); opacity: 0.9; }

        .search-box { 
            display: flex; background: rgba(255,255,255,0.1); 
            border-radius: 12px; padding: 4px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        #search-input { 
            flex: 1; border: none; background: transparent; color: white;
            padding: 10px 14px; font-size: 16px; outline: none;
        }
        #search-input::placeholder { color: rgba(255,255,255,0.5); }
        .search-btn { 
            background: var(--accent); color: white; border: none; 
            padding: 0 16px; border-radius: 8px; font-weight: 700;
            display: flex; align-items: center; gap: 4px;
        }

        /* 3열 필터 그리드 */
        .filter-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; 
            padding: 10px 12px; background: #fff; border-bottom: 1px solid #eee;
            position: sticky; top: 115px; z-index: 999;
        }
        .filter-btn { 
            border: 1px solid #f0f0f0; padding: 10px 2px; border-radius: 8px;
            font-size: 11px; text-align: center; background: #fafafa;
            color: var(--text-sub); transition: 0.2s; font-weight: 500;
        }
        .filter-btn.active { 
            background: var(--primary); color: white; border-color: var(--primary);
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        /* 대시보드 */
        #dashboard { padding: 15px; animation: fadeIn 0.4s ease-out; }
        .section-header { 
            display: flex; align-items: center; gap: 8px; 
            margin: 20px 0 12px; font-weight: 700; font-size: 16px; color: var(--primary);
        }
        .section-header .material-icons { font-size: 20px; }

        .dash-card { 
            background: white; border-radius: 14px; padding: 14px 18px; 
            margin-bottom: 10px; box-shadow: var(--shadow);
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #f5f5f5; transition: 0.2s;
        }
        .dash-card:active { transform: scale(0.98); background: #f9f9f9; }
        .dash-card .info { display: flex; flex-direction: column; gap: 2px; }
        .dash-card .book-tag { font-size: 11px; color: var(--accent); font-weight: 700; }
        .dash-card .preview { font-size: 15px; font-weight: 500; color: var(--text-main); }
        .dash-card .hist-tag { color: #888; font-size: 14px; }

        /* 검색 결과 */
        #results { padding: 10px 0 40px; }
        .res-card { 
            background: white; margin: 0 12px 14px; padding: 18px;
            border-radius: 16px; border-left: 5px solid var(--accent);
            box-shadow: var(--shadow); animation: slideUp 0.3s ease-out;
        }
        .res-meta { font-size: 12px; color: var(--accent); font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        .res-content { font-size: 16px; color: var(--text-main); line-height: 1.7; word-break: keep-all; }
        .highlight { background: #fff3cd; color: #856404; font-weight: bold; border-radius: 3px; padding: 0 2px; }
        .gold-mark { background: var(--accent); color: white; box-shadow: 0 0 10px rgba(212,175,55,0.4); }

        /* 독서 레이어 */
        #reader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 2000; display: none; flex-direction: column;
        }
        .reader-nav { 
            padding: 12px 15px; display: flex; align-items: center; gap: 10px;
            background: #fff; border-bottom: 1px solid #eee; position: sticky; top:0;
        }
        #reader-title { flex: 1; text-align: center; font-weight: 700; font-size: 14px; color: #444; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        
        .font-ctrl { 
            display: flex; align-items: center; gap: 8px; background: #f0f0f0; 
            padding: 4px 10px; border-radius: 20px;
        }
        .font-ctrl input { width: 60px; accent-color: var(--primary); }

        #reader-body { 
            flex: 1; overflow-y: auto; padding: 30px 20px; 
            font-size: 18px; line-height: 2.1; color: #333; word-break: keep-all;
        }
        #reader-body p { margin-bottom: 25px; border-bottom: 1px dashed #f0f0f0; padding-bottom: 15px; }
        #reader-body .verse-num { font-weight: bold; color: var(--accent); margin-right: 8px; font-family: 'Outfit'; }

        .reader-footer { 
            padding: 15px; border-top: 1px solid #eee; background: #fff;
            display: flex; gap: 10px;
        }
        .f-btn { 
            flex: 1; padding: 15px; border-radius: 12px; border: none; 
            font-weight: 700; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* 애니메이션 */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 유틸리티 */
        .hidden { display: none !important; }
        .no-data { padding: 100px 0; text-align: center; color: #ccc; font-weight: 500; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="logo">성구검색 <span>MASTER v3.0</span></div>
        <div id="loading" style="display:none;"><small>로딩중...</small></div>
    </div>
    <div class="search-row">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="성구명 또는 검색어를 입력하세요" autocomplete="off" onkeypress="if(event.keyCode==13) runSearch()">
            <button class="search-btn" onclick="runSearch()">
                <span class="material-icons">search</span>
            </button>
        </div>
    </div>
</header>

<!-- 필터 그리드 (JS에서 동적 생성) -->
<div class="filter-grid" id="filter-grid"></div>

<!-- 대시보드 (홈) -->
<div id="dashboard">
    <div class="section-header">
        <span class="material-icons" style="color:var(--accent)">stars</span>
        <span>즐겨찾는 성구</span>
    </div>
    <div id="bm-list"></div>

    <div class="section-header">
        <span class="material-icons" style="color:var(--text-sub)">history</span>
        <span>최근 검색어</span>
    </div>
    <div id="history-list"></div>
</div>

<!-- 검색 결과 리스트 -->
<div id="results" class="hidden"></div>

<!-- 독서 전면 레이어 -->
<div id="reader">
    <div class="reader-nav">
        <span class="material-icons" onclick="closeReader()" style="font-size:32px; color:var(--primary)">close</span>
        <div id="reader-title">성구 본문 읽기</div>
        <div class="font-ctrl">
            <small>가</small>
            <input type="range" min="14" max="35" value="18" oninput="changeFontSize(this.value)">
            <b>가</b>
        </div>
    </div>
    <div id="reader-body"></div>
    <div class="reader-footer">
        <button class="f-btn" id="bm-btn" style="background:#f5f5f5; color:#444;" onclick="toggleBookmark()">
            <span class="material-icons" id="bm-icon">bookmark_border</span> 저장
        </button>
        <button class="f-btn" style="background:var(--primary); color:white;" onclick="copyToClipboard()">
            <span class="material-icons">content_copy</span> 출처 포함 복사
        </button>
    </div>
</div>

<!-- 데이터 로드 및 엔진 -->
<script src="data.js"></script>
<script>
    /**
     * 성구 검색 엔진 v3.0 Master Edition
     * 개발자: AG (Antigravity)
     */
    
    let holyDB = []; // 파싱된 전체 데이터
    let activeFilter = "전체";
    let curIdx = -1; // 현재 읽고 있는 인덱스
    let lastQuery = "";

    // 성구 리스트 (data.js의 키와 일치해야 함)
    const bibleList = [
        "전체", "천지개벽경(안원전)", "천지개벽경(이중성)", "천지개벽경(정영규)", 
        "대순전경", "증산도 도전", "도전", "중화경", "홍경래전", "용호비결", 
        "동경대전", "용담유사", "격암유록", "정감록", "송구영신", "태을주", 
        "운수납명", "포덕공사", "의통인패", "현무경", "천지공사", "화천"
    ];

    window.onload = async () => {
        initUI();
        await loadAndParseData();
        renderDashboard();
    };

    // UI 초기화
    function initUI() {
        const grid = document.getElementById('filter-grid');
        grid.innerHTML = bibleList.map(b => {
             // UI 명칭을 간결하게 (괄호 제거 등)
             let display = b.split('(')[0];
             if(display.length > 5) display = display.substring(0,4) + '..';
             return `<div class="filter-btn ${b===activeFilter?'active':''}" onclick="setFilter('${b}')">${display}</div>`;
        }).join('');
    }

    function setFilter(name) {
        activeFilter = name;
        initUI();
        if(document.getElementById('search-input').value) runSearch();
    }

    // 데이터 파싱 (v3.0 최적화: 마크다운 구조 해석)
    async function loadAndParseData() {
        document.getElementById('loading').style.display = 'block';
        if (typeof window.BIBLE_DATA_RAW === 'undefined') {
            console.error("data.js를 찾을 수 없습니다.");
            return;
        }

        const raw = window.BIBLE_DATA_RAW;
        const parsed = [];

        for (const [book, content] of Object.entries(raw)) {
            const sections = content.split(/\n## /); // 편/연도 단위
            sections.forEach(sec => {
                const lines = sec.split('\n');
                let sectionName = lines[0].trim().replace(/^#+ /, "");
                
                // [안원전 핀셋 로직] 한자 치환
                sectionName = sectionName.replace("辛丑年", "제1편 신축년");
                sectionName = sectionName.replace("壬寅年", "제2편 임인년");
                sectionName = sectionName.replace("癸卯년", "제3편 계묘년");
                sectionName = sectionName.replace("甲辰年", "제4편 갑진년");
                sectionName = sectionName.replace("乙巳年", "제5편 을사년");
                sectionName = sectionName.replace("丙午년", "제6편 병오년");
                sectionName = sectionName.replace("丁未년", "제7편 정미년");
                sectionName = sectionName.replace("戊申年", "제8편 무신년");
                sectionName = sectionName.replace("己酉年", "제9편 기유년");

                const chapters = sec.split(/\n### /); // 장 단위
                chapters.forEach(chap => {
                    const cLines = chap.split('\n');
                    let chapName = cLines[0].trim().replace(/^#+ /, "");
                    
                    // 장 내부 절 파싱
                    const verses = chap.split(/【(\d+)】/);
                    for (let i = 1; i < verses.length; i += 2) {
                        const vNum = verses[i];
                        const vText = verses[i + 1].trim().split('\n')[0]; // 주석 제외 본문만 우선 추출
                        if (vText) {
                            parsed.push({
                                id: parsed.length,
                                book: book,
                                section: sectionName,
                                chapter: chapName,
                                verse: vNum,
                                content: vText,
                                raw: verses[i+1] // 전체 텍스트 (주석 포함)
                            });
                        }
                    }
                });
            });
        }
        holyDB = parsed;
        document.getElementById('loading').style.display = 'none';
        console.log(`총 ${holyDB.length}개 절 로딩 완료`);
    }

    // 검색 실행 (v3.0 안원전 강력 그룹화 로직)
    function runSearch() {
        const query = document.getElementById('search-input').value.trim();
        if (!query) return;
        lastQuery = query;
        addSearchHistory(query);

        document.getElementById('dashboard').classList.add('hidden');
        const resDiv = document.getElementById('results');
        resDiv.classList.remove('hidden');
        resDiv.innerHTML = `<div class="no-data">검색 중...</div>`;

        let filtered = holyDB.filter(item => {
            if (activeFilter !== "전체" && item.book !== activeFilter) return false;
            return item.content.includes(query);
        });

        // [안원전 핀셋 로직] 장(Chapter)별 그룹화
        if (activeFilter.includes("안원전")) {
            const groupMap = new Map();
            filtered.forEach(it => {
                const key = `${it.section} ${it.chapter}`;
                if (!groupMap.has(key)) groupMap.set(key, it);
            });
            filtered = Array.from(groupMap.values());
        }

        if (filtered.length === 0) {
            resDiv.innerHTML = `<div class="no-data">검색 결과가 없습니다.</div>`;
            return;
        }

        resDiv.innerHTML = filtered.map(it => `
            <div class="res-card" onclick="openReader(${it.id}, '${query}')">
                <div class="res-meta">
                    <span class="material-icons" style="font-size:14px;">menu_book</span>
                    ${it.book} | ${it.section}
                </div>
                <div class="res-content">
                    ${activeFilter.includes("안원전") ? 
                        `<b>${it.chapter}</b> 내 검색어가 포함되어 있습니다.` : 
                        highlightText(it.content, query)}
                </div>
            </div>
        `).join('');
    }

    function highlightText(text, q) {
        return text.replace(new RegExp(q, 'gi'), match => `<span class="highlight">${match}</span>`);
    }

    // 독서 레이어 오픈 + 자동 스크롤 + 황금 하이라이트
    function openReader(id, query = "") {
        curIdx = id;
        const item = holyDB[id];
        const reader = document.getElementById('reader');
        const body = document.getElementById('reader-body');
        const title = document.getElementById('reader-title');

        title.innerText = `${item.book} | ${item.section}`;
        
        // 동일 장(Chapter) 전체 절 가져오기
        const chapterVerses = holyDB.filter(d => d.book === item.book && d.section === item.section && d.chapter === item.chapter);
        
        body.innerHTML = `<h3>${item.chapter}</h3>` + chapterVerses.map(v => `
            <p id="v-${v.id}" class="${v.id === id ? 'target-verse' : ''}">
                <span class="verse-num">${v.verse}</span>
                <span class="v-text">${highlightText(v.content, query)}</span>
            </p>
        `).join('');

        reader.style.display = 'flex';
        
        // 자동 스크롤 및 황금색 강조
        setTimeout(() => {
            const target = document.getElementById(`v-${id}`);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                target.classList.add('gold-mark');
                setTimeout(() => target.classList.remove('gold-mark'), 2000);
            }
        }, 300);

        updateBookmarkUI();
    }

    function closeReader() {
        document.getElementById('reader').style.display = 'none';
    }

    function changeFontSize(size) {
        document.getElementById('reader-body').style.fontSize = size + 'px';
    }

    // 출처 포함 복사 기능
    function copyToClipboard() {
        const item = holyDB[curIdx];
        const text = `[${item.book} ${item.section} ${item.chapter} ${item.verse}절] \n${item.content}\n\n- 성구검색 Master v3.0`;
        
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(() => {
                alert("출처를 포함하여 복사되었습니다.");
            });
        } else {
            const area = document.createElement('textarea');
            area.value = text;
            document.body.appendChild(area);
            area.select();
            document.execCommand('copy');
            document.body.removeChild(area);
            alert("복사되었습니다.");
        }
    }

    // 즐겨찾기 (localStorage)
    function toggleBookmark() {
        let bms = JSON.parse(localStorage.getItem('h_bm') || "[]");
        const found = bms.indexOf(curIdx);
        if (found > -1) {
            bms.splice(found, 1);
        } else {
            bms.push(curIdx);
        }
        localStorage.setItem('h_bm', JSON.stringify(bms));
        updateBookmarkUI();
        renderDashboard();
    }

    function updateBookmarkUI() {
        const bms = JSON.parse(localStorage.getItem('h_bm') || "[]");
        const icon = document.getElementById('bm-icon');
        const btn = document.getElementById('bm-btn');
        if (bms.includes(curIdx)) {
            icon.innerText = "bookmark";
            btn.style.color = "var(--accent)";
        } else {
            icon.innerText = "bookmark_border";
            btn.style.color = "#444";
        }
    }

    // 최근 검색어 관리
    function addSearchHistory(q) {
        let hist = JSON.parse(localStorage.getItem('h_sh') || "[]");
        hist = [q, ...hist.filter(x => x !== q)].slice(0, 6);
        localStorage.setItem('h_sh', JSON.stringify(hist));
        renderDashboard();
    }

    function renderDashboard() {
        const bmList = document.getElementById('bm-list');
        const histList = document.getElementById('history-list');
        
        const bms = JSON.parse(localStorage.getItem('h_bm') || "[]");
        const hist = JSON.parse(localStorage.getItem('h_sh') || "[]");

        if (bms.length === 0) {
            bmList.innerHTML = `<div style="color:#bbb; font-size:13px; padding:10px;">저장된 성구가 없습니다.</div>`;
        } else {
            bmList.innerHTML = bms.slice(-5).reverse().map(id => {
                const it = holyDB[id];
                if(!it) return "";
                return `
                    <div class="dash-card" onclick="openReader(${id})">
                        <div class="info">
                            <span class="book-tag">${it.book}</span>
                            <span class="preview">${it.content.substring(0, 20)}...</span>
                        </div>
                        <span class="material-icons" style="color:#ddd">chevron_right</span>
                    </div>
                `;
            }).join('');
        }

        histList.innerHTML = hist.map(q => `
            <div class="dash-card" onclick="document.getElementById('search-input').value='${q}'; runSearch();">
                <span class="hist-tag">${q}</span>
                <span class="material-icons" style="color:#eee">search</span>
            </div>
        `).join('');
    }
</script>
</body>
</html>
