<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성구(原典) 검색 v1.5.6 M (Hard-coded Logic)</title>
    <!-- 구글 폰트: 나눔 명조(본문용), 폰트(Gothic) -->
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-light: #F9F9F9;
            --bg-paper: #FDFBF7; /* 연한 종이 질감 색상 */
            --card-bg: #FFFFFF;
            --text-main: #222222;
            --text-muted: #666666;
            --gold-premium: #D4AF37;
            --gold-active: #B8952E;
            --shadow-soft: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-medium: 0 8px 20px rgba(0, 0, 0, 0.08);
            --border-light: #EEEEEE;
        }

        body, html {
            margin: 0; padding: 0; background-color: var(--bg-light);
            color: var(--text-main); font-family: 'Noto Sans KR', sans-serif;
            height: 100%; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }

        .mobile-container { display: flex; flex-direction: column; min-height: 100vh; }

        /* 헤더: 검색바 및 필터 고정 */
        .app-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(249, 249, 249, 0.95); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-light); padding: 12px 16px;
        }

        .search-box {
            display: flex; background: var(--card-bg);
            border: 1px solid var(--border-light); border-radius: 12px;
            padding: 2px 16px; align-items: center; margin-bottom: 12px;
            box-shadow: var(--shadow-soft);
        }

        #searchInput {
            flex-grow: 1; background: transparent; border: none; outline: none;
            color: var(--text-main); font-size: 18px; padding: 10px 0;
            font-family: inherit; font-weight: 500;
        }

        /* 필터 그리드 (3열) */
        .filter-section { margin-top: 4px; }
        
        .all-btn {
            width: 100%; padding: 12px; margin-bottom: 8px;
            background: var(--card-bg); border: 1.5px solid var(--border-light);
            color: var(--text-main); border-radius: 10px; font-weight: 800;
            font-size: 17px; cursor: pointer; transition: all 0.2s;
            box-shadow: var(--shadow-soft);
        }
        .all-btn.active { border-color: var(--gold-premium); color: #fff; background: var(--gold-premium); }

        .filter-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            max-height: 280px; 
            overflow-y: auto; padding-bottom: 10px;
        }

        .filter-item {
            display: flex; align-items: center; justify-content: center;
            height: 48px; 
            padding: 4px; background: var(--card-bg);
            border: 1.5px solid var(--border-light); border-radius: 8px;
            color: var(--text-muted); font-size: 16px; font-weight: 800; 
            text-align: center; cursor: pointer; transition: all 0.2s;
            box-shadow: var(--shadow-soft);
            word-break: keep-all; line-height: 1.1;
            letter-spacing: -1px;
            overflow: hidden;
        }

        .filter-item.active {
            border-color: var(--gold-premium); color: #fff; background: var(--gold-premium);
            box-shadow: var(--shadow-medium);
        }

        /* 결과 리스트 (카드 UI) */
        .results-container { flex-grow: 1; padding: 16px; }
        .status-msg { text-align: center; color: var(--text-muted); margin-top: 40px; font-size: 15px; line-height: 1.6; }

        .match-item { 
            margin-bottom: 12px; 
            background: var(--card-bg);
            border-radius: 12px;
            padding: 14px 16px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-light);
            animation: fadeIn 0.4s ease; 
            cursor: pointer;
        }
        .match-item:active { background-color: #f1f1f1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .match-header { 
            font-size: 13px; color: var(--gold-active); margin-bottom: 8px; 
            font-weight: 700; letter-spacing: -0.5px;
        }
        .match-text {
            font-size: 16px; line-height: 1.6; color: var(--text-main);
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; text-overflow: ellipsis;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .load-more-btn {
            display: block; width: 100%; padding: 16px; margin: 20px 0 40px;
            background: var(--card-bg); border: 1.5px solid var(--gold-premium);
            color: var(--gold-premium); border-radius: 12px; font-size: 16px; font-weight: 700;
        }

        /* 푸터 */
        .app-footer { padding: 40px 20px; text-align: center; border-top: 1px solid var(--border-light); }
        .pc-link { color: var(--text-muted); text-decoration: none; font-size: 14px; border-bottom: 1px solid #ddd; }

        /* 독서 레이어 (전면형) */
        #readerLayer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-paper); 
            z-index: 200; display: none; flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .reader-header { 
            padding: 16px 20px; border-bottom: 1px solid var(--border-light); 
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-paper);
        }
        .reader-title { font-size: 18px; font-weight: 800; color: var(--gold-active); }
        .close-btn { font-size: 32px; color: var(--text-main); background: transparent; border: none; padding: 0 10px; cursor: pointer; }

        .reader-content { 
            flex-grow: 1; overflow-y: auto; padding: 30px 24px 120px; 
            line-height: 2.2; font-size: 19px; 
            font-family: 'Nanum Myeongjo', serif;
            color: #333;
        }
        .reader-content h2 { color: var(--gold-active); font-size: 22px; border-bottom: 2px solid var(--gold-premium); padding-bottom: 10px; margin-top: 40px; font-weight: 800; }
        .reader-content h3 { color: #555; font-size: 17px; margin-top: 30px; border-left: 4px solid var(--gold-premium); padding-left: 12px; }
        .reader-content p { margin-bottom: 22px; text-align: justify; }
        .highlight-verse { 
            color: #000 !important; font-weight: 800; 
            background: rgba(212, 175, 55, 0.12); 
            padding: 8px 12px; border-radius: 6px; 
            border-left: 5px solid var(--gold-premium); 
            box-shadow: var(--shadow-soft);
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <header class="app-header">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="성구 또는 초성을 입력하세요..." autocomplete="off">
            </div>
            <div class="filter-section">
                <button id="allFilterBtn" class="all-btn active">전체 경전 검색</button>
                <div id="filterGrid" class="filter-grid"></div>
            </div>
        </header>

        <main class="results-container" id="resultsContainer">
            <div class="status-msg" id="statusMsg">
                <strong>성구(原典) 검색 v1.5</strong><br>
                고가독성 라이트 에디션 활성화됨.<br><br>
                필터를 선택하거나 검색어를 입력하세요.
            </div>
        </main>

        <footer class="app-footer">
            <a href="index.html?mode=pc" class="pc-link">PC 버전(Hyunmu)으로 전환</a>
        </footer>
    </div>

    <!-- 상세 열람 레이어 (전면 레이어) -->
    <div id="readerLayer">
        <header class="reader-header">
            <span class="reader-title" id="readerTitle">성구 전문</span>
            <button class="close-btn" id="closeReader">&times;</button>
        </header>
        <div class="reader-content" id="readerContent"></div>
    </div>

    <script src="data.js"></script>
    <script>
        let BIBLE_DATA = {};
        let BIBLE_LIST = [];
        let SELECTED_BOOK = 'all';
        let ALL_RESULTS = [];
        let CURRENT_PAGE = 0;
        const PAGE_SIZE = 25;
        let searchTimer = null;

        const CHOSEONG = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

        document.addEventListener("DOMContentLoaded", () => {
            if (typeof window.BIBLE_DATA_RAW !== 'undefined') {
                BIBLE_DATA = window.BIBLE_DATA_RAW;
                BIBLE_LIST = Object.keys(BIBLE_DATA).sort();
                initFilters();
            } else {
                document.getElementById('statusMsg').innerHTML = "경전 데이터를 불러올 수 없습니다. (data.js 확인 필요)";
            }

            document.getElementById('searchInput').addEventListener('input', (e) => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => {
                    performSearch();
                }, 300);
            });

            document.getElementById('allFilterBtn').addEventListener('click', () => {
                setFilter('all');
            });

            document.getElementById('closeReader').addEventListener('click', () => {
                const layer = document.getElementById('readerLayer');
                layer.style.display = 'none';
                document.body.style.overflow = 'auto';
            });
        });

        function getPremiumName(fullName) {
            if (fullName.includes("안원전")) return "천지개벽경(안원전)";
            if (fullName.includes("정영규")) return "천지개벽경(정영규)";
            if (fullName.includes("이중성")) return "천지개벽경(이중성)";
            
            let name = fullName.split('(')[0].trim();
            if (name.includes("대순전경")) return "대순전경";
            if (name.includes("증산도 도전")) return "증산도도전";
            if (name.includes("화은당실기")) return "화은당실기";
            
            if (name.length > 5) return name.substring(0, 5);
            return name;
        }

        function initFilters() {
            const grid = document.getElementById('filterGrid');
            grid.innerHTML = ""; 
            BIBLE_LIST.forEach(book => {
                const btn = document.createElement('div');
                btn.className = 'filter-item';
                btn.textContent = getPremiumName(book);
                btn.onclick = () => setFilter(book);
                btn.id = `filter-${book.replace(/\s+/g, '-')}`;
                grid.appendChild(btn);
            });
        }

        function setFilter(book) {
            SELECTED_BOOK = book;
            document.querySelectorAll('.filter-item').forEach(el => el.classList.remove('active'));
            document.getElementById('allFilterBtn').classList.remove('active');
            if (book === 'all') {
                document.getElementById('allFilterBtn').classList.add('active');
            } else {
                const targetId = `filter-${book.replace(/\s+/g, '-')}`;
                const target = document.getElementById(targetId);
                if (target) target.classList.add('active');
            }
            performSearch();
        }

        function getChoseong(text) {
            let result = "";
            for(let i=0; i<text.length; i++) {
                let code = text.charCodeAt(i) - 44032;
                if(code > -1 && code < 11172) {
                    result += CHOSEONG[Math.floor(code / 588)];
                } else {
                    result += text.charAt(i).toLowerCase(); 
                }
            }
            return result;
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim().replace(/\s+/g, '');
            const container = document.getElementById('resultsContainer');
            
            if (!query && SELECTED_BOOK === 'all') {
                container.innerHTML = `<div class="status-msg"><strong>성구(原典) 검색 v1.5</strong><br>필터를 선택하거나 검색어를 입력하세요.</div>`;
                return;
            }

            ALL_RESULTS = [];
            CURRENT_PAGE = 0;
            const targetBooks = SELECTED_BOOK === 'all' ? BIBLE_LIST : [SELECTED_BOOK];

            targetBooks.forEach(bookName => {
                const rawContent = BIBLE_DATA[bookName];
                const cleanContent = rawContent.replace(/!\[.*?\]\(.*?\)/g, '').replace(/<\/?[^>]+(>|$)/g, "");
                const lines = cleanContent.split('\n');
                
                let currentChapter = "";
                let currentVerse = "";
                const seenKeys = new Set(); 
                const isAnwonjeon = bookName.includes('안원전');

                for (let line of lines) {
                    let processedLine = line.trim();
                    if (!processedLine) continue;
                    
                    // [Hard-coding] 안원전 제1편 신축년 한자 강제 치환 및 목차 분리
                    if (isAnwonjeon && processedLine.includes("天地開闢經 第一篇 辛丑年")) {
                        processedLine = processedLine.replace("天地開闢經 第一篇 辛丑年", "천지개벽경 제1편 신축년");
                        currentChapter = "천지개벽경 제1편 신축년";
                    } else if (processedLine.startsWith('## ')) {
                        currentChapter = processedLine.replace('##', '').trim();
                    } else if (processedLine.startsWith('### ')) {
                        currentVerse = processedLine.replace('###', '').trim();
                    }

                    const searchLine = processedLine.toLowerCase().replace(/\s+/g, '');
                    if (!query || searchLine.includes(query) || getChoseong(searchLine).includes(query)) {
                        let key;
                        if (isAnwonjeon) {
                            key = `${bookName}-${currentChapter}`;
                        } else {
                            key = `${bookName}-${currentChapter}-${currentVerse}`;
                        }

                        if (!seenKeys.has(key)) {
                            let displayLine = processedLine;
                            if (processedLine.startsWith('#')) displayLine = processedLine.replace(/^#+\s+/, '');

                            ALL_RESULTS.push({ 
                                book: bookName, 
                                displayBook: getPremiumName(bookName),
                                chapter: currentChapter, 
                                verse: isAnwonjeon ? "" : currentVerse, 
                                text: displayLine,
                                isAggregated: isAnwonjeon,
                                query: query 
                            });
                            seenKeys.add(key);
                        }
                    }
                }
            });
            renderResults();
        }

        function renderResults() {
            const container = document.getElementById('resultsContainer');
            if (CURRENT_PAGE === 0) {
                container.innerHTML = "";
                window.scrollTo(0, 0);
            }

            if (ALL_RESULTS.length === 0) {
                container.innerHTML = `<div class="status-msg">해당하는 성구가 없습니다.</div>`;
                return;
            }

            const chunk = ALL_RESULTS.slice(CURRENT_PAGE * PAGE_SIZE, (CURRENT_PAGE + 1) * PAGE_SIZE);

            chunk.forEach(item => {
                const div = document.createElement('div');
                div.className = 'match-item';
                
                const locStr = `${item.chapter}${item.verse ? ' ' + item.verse : ''}`;
                
                div.innerHTML = `
                    <div class="match-header">${item.displayBook} | ${locStr}</div>
                    <div class="match-text">${item.text}</div>
                `;
                div.onclick = () => openReader(item.book, item.text, item.chapter, item.isAggregated, item.query);
                container.appendChild(div);
            });

            const oldBtn = document.getElementById('loadMoreBtn');
            if (oldBtn) oldBtn.remove();
            if (ALL_RESULTS.length > (CURRENT_PAGE + 1) * PAGE_SIZE) {
                const btn = document.createElement('button');
                btn.id = 'loadMoreBtn';
                btn.className = 'load-more-btn';
                btn.textContent = `결과 더보기 (${(CURRENT_PAGE + 1) * PAGE_SIZE} / ${ALL_RESULTS.length})`;
                btn.onclick = (e) => { 
                    e.stopPropagation();
                    CURRENT_PAGE++; 
                    renderResults(); 
                };
                container.appendChild(btn);
            }
        }

        function openReader(bookName, targetText, targetChapter, isAggregated, highlightQuery) {
            const layer = document.getElementById('readerLayer');
            const content = document.getElementById('readerContent');
            const title = document.getElementById('readerTitle');
            title.textContent = getPremiumName(bookName);
            
            const rawData = BIBLE_DATA[bookName].replace(/!\[.*?\]\(.*?\)/g, '');
            const lines = rawData.split('\n');
            
            let html = "";
            let currentChapter = "";
            let firstMatchId = "";

            lines.forEach((line, idx) => {
                let processedLine = line.trim();
                if (!processedLine) return;
                
                // 전면 레이어 열람 시에도 한자 강제 치환 및 가상 목차 적용
                if (bookName.includes('안원전') && processedLine.includes("天地開闢經 第一篇 辛丑年")) {
                    processedLine = processedLine.replace("天地開闢經 第一篇 辛丑年", "천지개벽경 제1편 신축년");
                    currentChapter = "천지개벽경 제1편 신축년";
                    const chapId = `chap-virtual-${idx}`;
                    html += `<h2 id="${chapId}" style="color:var(--gold-active); border-bottom:2px solid var(--gold-premium); padding-bottom:10px; margin-top:40px; font-weight:800;">${currentChapter}</h2>`;
                    if (isAggregated && currentChapter === targetChapter && !firstMatchId) firstMatchId = chapId;
                } else if (processedLine.startsWith('## ')) {
                    currentChapter = processedLine.replace('##', '').trim();
                    const chapId = `chap-${idx}`;
                    html += `<h2 id="${chapId}">${currentChapter}</h2>`;
                    if (isAggregated && currentChapter === targetChapter && !firstMatchId) firstMatchId = chapId;
                } else if (processedLine.startsWith('### ')) {
                    const verseId = `verse-${idx}`;
                    html += `<h3 id="${verseId}">${processedLine.replace('###', '').trim()}</h3>`;
                } else if (!processedLine.startsWith('#')) {
                    const cleanLine = processedLine.toLowerCase().replace(/\s+/g, '');
                    let isMatch = false;
                    
                    if (isAggregated) {
                        if (currentChapter === targetChapter && highlightQuery && (cleanLine.includes(highlightQuery) || getChoseong(cleanLine).includes(highlightQuery))) {
                            isMatch = true;
                        }
                    } else {
                        // targetText도 치환 과정에서 한글로 바뀌었을 가능성 고려
                        isMatch = (processedLine === targetText);
                    }
                    const lineId = `line-${idx}`;
                    if (isMatch && !firstMatchId) firstMatchId = lineId;
                    html += `<p class="${isMatch ? 'highlight-verse' : ''}" id="${lineId}">${processedLine}</p>`;
                }
            });

            content.innerHTML = html;
            layer.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            setTimeout(() => {
                const targetEl = document.getElementById(firstMatchId);
                if (targetEl) {
                    targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    content.scrollTop = 0;
                }
            }, 250);
        }
    </script>
</body>
</html>
