<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hyunmu 1.0</title>
    <!-- 홈 화면 추가 시 앱 아이콘 설정 -->
    <link rel="icon" href="icon.png?v=3.0" type="image/png">
    <link rel="shortcut icon" href="icon.png?v=3.0" type="image/x-icon">
    <link rel="apple-touch-icon" href="icon.png?v=3.0">
    <link rel="manifest" href="manifest.json?v=3.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Hyunmu 1.0">
    <!-- 구글 폰트: 나눔 명조(본문용), 폰트(Gothic) -->
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-light: #F9F9F9;
            --bg-paper: #FDFBF7;
            --card-bg: #FFFFFF;
            --text-main: #222222;
            --text-muted: #666666;
            --gold-premium: #D4AF37;
            --gold-active: #B8952E;
            --shadow-soft: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-medium: 0 8px 20px rgba(0, 0, 0, 0.08);
            --border-light: #EEEEEE;
            --accent-red: #E74C3C;
        }

        body, html {
            margin: 0; padding: 0; background-color: var(--bg-light);
            color: var(--text-main); font-family: 'Noto Serif KR', sans-serif;
            height: 100%; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }

        .mobile-container { display: flex; flex-direction: column; min-height: 100vh; }

        /* 헤더: 검색바 및 필터 고정 */
        .app-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(249, 249, 249, 0.95); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-light); padding: 6px 16px;
        }

        .header-main {
            display: flex; align-items: center; gap: 12px; margin-bottom: 4px;
            width: 100%;
        }

        .search-box {
            flex: 1; min-width: 0; display: flex; background: var(--card-bg);
            border: 1px solid var(--border-light); border-radius: 12px;
            padding: 2px 12px; align-items: center; height: 42px;
            box-shadow: var(--shadow-soft);
        }

        .youtube-link {
            flex: 0 0 30%; display: flex; align-items: center; justify-content: center;
            background: var(--card-bg); border: 2px solid #FF0000;
            border-radius: 12px; height: 42px; text-decoration: none;
            box-shadow: var(--shadow-soft); transition: transform 0.1s;
            overflow: hidden;
        }
        .youtube-link:active { transform: scale(0.96); }
        .youtube-link svg { width: 26px; height: 26px; margin-right: 4px; flex-shrink: 0; }
        .yt-text { color: var(--text-main); font-weight: 900; font-size: 16px; letter-spacing: -1.5px; }

        #searchInput {
            flex-grow: 1; background: transparent; border: none; outline: none;
            color: var(--text-main); font-size: 16px; padding: 8px 0;
            font-family: inherit; font-weight: 500;
        }

        /* 필터 그리드 (3열) */
        .filter-section { margin-top: 4px; }
        
        .all-btn {
            width: 100%; padding: 8px; margin-bottom: 4px;
            background: var(--card-bg); border: 1.5px solid var(--border-light);
            color: var(--text-main); border-radius: 10px; font-weight: 800;
            font-size: 15px; cursor: pointer; transition: all 0.2s;
            box-shadow: var(--shadow-soft);
        }
        .all-btn.active { border-color: var(--gold-premium); color: #fff; background: var(--gold-premium); }

        .filter-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
            max-height: 200px; 
            overflow-y: auto; padding-bottom: 6px;
        }

        .filter-item {
            display: flex; align-items: center; justify-content: center;
            height: 38px; 
            padding: 4px; background: var(--card-bg);
            border: 1.5px solid var(--border-light); border-radius: 8px;
            color: var(--text-muted); font-size: 14px; font-weight: 800; 
            text-align: center; cursor: pointer; transition: all 0.2s;
            box-shadow: var(--shadow-soft);
            word-break: keep-all; line-height: 1.1;
            letter-spacing: -1.2px;
            overflow: hidden;
        }

        .filter-item.active {
            border-color: var(--gold-premium); color: #fff; background: var(--gold-premium);
            box-shadow: var(--shadow-medium);
        }

        /* 역도(易道) 토글 메뉴 스타일 */
        .yido-toggle-menu {
            margin-bottom: 8px;
            background: var(--card-bg);
            border: 1px solid var(--gold-premium);
            border-radius: 10px;
            overflow: hidden;
        }
        .yido-toggle-header {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 800;
            color: var(--gold-active);
            font-size: 15px;
            cursor: pointer;
            background: rgba(212, 175, 55, 0.05);
        }
        .yido-arrow {
            font-size: 12px;
            transition: transform 0.3s ease;
        }
        .yido-toggle-menu.open .yido-arrow {
            transform: rotate(90deg);
        }
        .yido-content {
            display: none;
            padding: 8px 12px;
            border-top: 1px solid var(--border-light);
            background: var(--bg-paper);
        }
        .yido-toggle-menu.open .yido-content {
            display: block;
        }
        .yido-item {
            padding: 10px 8px;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            border-bottom: 1px dashed var(--border-light);
            cursor: pointer;
        }
        .yido-item:last-child {
            border-bottom: none;
        }

        /* 결과 리스트 */
        .results-container { flex-grow: 1; padding: 16px; min-height: 300px; }
        .status-msg { text-align: center; color: var(--text-muted); margin-top: 40px; font-size: 15px; line-height: 1.6; }

        /* 대시보드 UI */
        .dashboard-section { margin-bottom: 24px; animation: fadeIn 0.5s ease; }
        .dashboard-title { 
            font-size: 16px; font-weight: 900; color: #333; 
            margin-bottom: 12px; display: flex; align-items: center;
            border-left: 4px solid var(--gold-premium); padding-left: 10px;
        }
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .dashboard-item {
            background: #fff; border: 1px solid var(--border-light);
            padding: 12px 14px; border-radius: 10px; box-shadow: var(--shadow-soft);
            display: flex; flex-direction: column; cursor: pointer;
        }
        .dashboard-item:active { background: #f5f5f5; }
        .db-header { font-size: 12px; color: var(--gold-active); font-weight: 700; margin-bottom: 4px; }
        .db-text { font-size: 14px; color: #444; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .recent-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { 
            background: #eee; padding: 6px 14px; border-radius: 20px; 
            font-size: 14px; color: #555; font-weight: 600; cursor: pointer;
        }

        .match-item { 
            margin-bottom: 12px; 
            background: var(--card-bg);
            border-radius: 12px;
            padding: 14px 16px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-light);
            animation: fadeIn 0.4s ease; 
            cursor: pointer;
        }
        .match-item:active { background-color: #f1f1f1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .match-header { 
            font-size: 13px; color: var(--gold-active); margin-bottom: 8px; 
            font-weight: 700; letter-spacing: -0.5px;
        }
        .match-text {
            font-size: 16px; line-height: 1.6; color: var(--text-main);
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; text-overflow: ellipsis;
            font-family: 'Noto Serif KR', sans-serif;
        }

        .load-more-btn {
            display: block; width: 100%; padding: 16px; margin: 20px 0 40px;
            background: var(--card-bg); border: 1.5px solid var(--gold-premium);
            color: var(--gold-premium); border-radius: 12px; font-size: 16px; font-weight: 700;
        }

        /* 독서 레이어 */
        #readerLayer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-paper); 
            z-index: 200; display: none; flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .reader-header { 
            padding: 12px 16px; border-bottom: 1px solid var(--border-light); 
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-paper);
        }
        .reader-title-area { flex-grow: 1; margin-right: 10px; }
        .reader-title { font-size: 17px; font-weight: 800; color: var(--gold-active); block-size: 24px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
        
        .reader-actions { display: flex; align-items: center; gap: 8px; }
        .action-btn { 
            background: #fff; border: 1px solid #ddd; border-radius: 8px;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; box-shadow: var(--shadow-soft);
        }
        .action-btn.active { color: var(--gold-premium); border-color: var(--gold-premium); }
        .btn-close { font-size: 28px; line-height: 1; padding-bottom: 4px; }

        .reader-content { 
            flex-grow: 1; overflow-y: auto; padding: 30px 24px 120px; 
            line-height: 2.2; font-size: 19px; 
            font-family: 'Noto Serif KR', 'Nanum Myeongjo', serif;
            color: #333;
            white-space: pre-wrap;
        }
        .reader-content h2 { color: var(--gold-active); font-size: 22px; border-bottom: 2px solid var(--gold-premium); padding-bottom: 10px; margin-top: 40px; font-weight: 800; }
        .reader-content h3 { color: #555; font-size: 17px; margin-top: 30px; border-left: 4px solid var(--gold-premium); padding-left: 12px; }
        .reader-content p { margin-bottom: 22px; text-align: justify; }
        .highlight-verse { 
            color: #000 !important; font-weight: 800; 
            background: rgba(212, 175, 55, 0.1); 
            padding: 12px; border-radius: 8px; 
            border-left: 6px solid var(--gold-premium); 
            box-shadow: var(--shadow-medium);
            transform: scale(1.01);
            transition: all 0.3s;
        }

        /* 토스트 메시지 */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
            border-radius: 30px; font-size: 14px; z-index: 1000;
            display: none; animation: fadeIn 0.3s;
        }

        .highlight-target {
            color: #000 !important; font-weight: 800; 
            background: rgba(212, 175, 55, 0.3) !important; 
            padding: 12px; border-radius: 8px; 
            border-left: 6px solid var(--gold-premium); 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            transform: scale(1.02);
            transition: all 0.4s ease-out;
        }
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <header class="app-header">
            <div style="display: flex; justify-content: center; align-items: center; margin-bottom: 6px; padding: 4px 0;">
                <span style="font-size: 18px; font-weight: 900; color: var(--gold-premium); letter-spacing: 1px; text-shadow: 0 0 8px rgba(212, 175, 55, 0.2);">성구(原典) 검색 Hyunmu 1.0</span>
            </div>
            <div class="header-main">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="성구 또는 초성..." autocomplete="off">
                </div>
                <a href="https://www.youtube.com/@daehando/videos" target="_blank" class="youtube-link">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="#FF0000"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                    <span class="yt-text">대한도</span>
                </a>
            </div>
            <div class="filter-section">
                <!-- 역도(易道) 및 현무경 PDF 토글 메뉴 -->
                <div class="yido-toggle-menu" id="yidoMenu">
                    <div class="yido-toggle-header" onclick="toggleYidoMenu()">
                        <span>역경(易經) & 현무경(PDF) 열기</span>
                        <span class="yido-arrow">▶</span>
                    </div>
                    <div class="yido-content" id="yidoContent">
                        <div style="font-size: 13px; color: #888; font-weight: 600; margin-bottom: 4px;">현무경 (PDF)</div>
                        <div class="yido-item" onclick="openPDF('현무경(법종교).pdf')">📄 현무경 (법종교)</div>
                        <div class="yido-item" onclick="openPDF('현무경(순천도).pdf')">📄 현무경 (순천도)</div>
                        <div style="font-size: 13px; color: #888; font-weight: 600; margin: 12px 0 4px;">역경 (易經) 라이브러리</div>
                        <!-- [맞춤형 내부 이식] 베이지 톤의 검색바 -->
                        <div class="yido-search-unit" style="margin-bottom: 12px; position: relative; box-sizing: border-box;">
                            <input type="text" id="yidoSearchInput" placeholder="🔍 라이브러리 내 검색..." 
                                style="width: 100%; padding: 10px 35px 10px 12px; border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 10px; 
                                font-size: 14px; outline: none; box-sizing: border-box; background: #F5F1E9; color: #444; font-family: inherit;">
                            <span id="yidoSearchClear" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--gold-premium); cursor: pointer; display: none; font-size: 18px;">&times;</span>
                        </div>
                        <div id="yidoDynamicList"></div>
                    </div>
                </div>

                <button id="allFilterBtn" class="all-btn active">전체 성구 검색</button>
                <div id="filterGrid" class="filter-grid"></div>
            </div>
        </header>


        <main class="results-container" id="resultsContainer">
            <!-- 대시보드가 여기 삽입됨 -->
        </main>

        <footer class="app-footer" style="padding: 40px 20px; text-align: center; border-top: 1px solid var(--border-light);">
            <a href="index.html?mode=pc" style="color: var(--text-muted); text-decoration: none; font-size: 14px; border-bottom: 1px solid #ddd;">PC 버전(Hyunmu)으로 전환</a>
        </footer>
    </div>

    <!-- 상세 열람 레이어 -->
    <div id="readerLayer">
        <header class="reader-header">
            <div class="reader-title-area">
                <span class="reader-title" id="readerTitle">성구 전문</span>
            </div>
            <div class="reader-actions">
                <button class="action-btn" id="btnCopy" title="복사">📋</button>
                <button class="action-btn" id="btnBookmark" title="책갈피">★</button>
                <button class="action-btn btn-close" id="closeReader">&times;</button>
            </div>
        </header>
        <div class="reader-content" id="readerContent"></div>
    </div>

    <div id="toast"></div>

    <script src="data.js"></script>
    <script src="data_md.js"></script>
    <script>
        let BIBLE_DATA = {};
        let BIBLE_LIST = [];
        let YEOKDO_DATA = {};
        let YEOKDO_LIST = [];
        let SELECTED_BOOK = 'all';
        let ALL_RESULTS = [];
        let CURRENT_PAGE = 0;
        const PAGE_SIZE = 25;
        let searchTimer = null;
        
        let CURRENT_CONTEXT = null; // 현재 읽고 있는 구절 정보

        const STORAGE_KEYS = {
            BOOKMARKS: 'ag_mobile_bookmarks_v1',
            SEARCHES: 'ag_mobile_searches_v1'
        };

        const CHOSEONG = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

        document.addEventListener("DOMContentLoaded", () => {
            if (typeof window.BIBLE_DATA_RAW !== 'undefined') {
                BIBLE_DATA = window.BIBLE_DATA_RAW;
                BIBLE_LIST = Object.keys(BIBLE_DATA).sort();

                if (typeof yeokdoData !== 'undefined') {
                    YEOKDO_DATA = yeokdoData;
                    YEOKDO_LIST = Object.keys(YEOKDO_DATA);
                    initYidoList();
                }

                initFilters();
                renderDashboard();
            } else {
                document.getElementById('resultsContainer').innerHTML = "<div class='status-msg'>경전 데이터를 불러올 수 없습니다.</div>";
            }

            document.getElementById('searchInput').addEventListener('input', (e) => {
                const query = e.target.value.trim();
                
                // [수정] 실시간 검색 필터는 유지 (즉시 반영)
                if (!query) {
                    renderDashboard();
                } else {
                    performSearch();
                }

                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => {
                    if (query.length >= 2) { 
                        saveRecentSearch(query); // 1초간 입력 없을 때만 저장
                    }
                }, 1000);
            });

            document.getElementById('allFilterBtn').addEventListener('click', () => {
                setFilter('all');
            });

            document.getElementById('closeReader').addEventListener('click', () => {
                const layer = document.getElementById('readerLayer');
                layer.style.display = 'none';
                document.body.style.overflow = 'auto';
            });

            document.getElementById('btnBookmark').addEventListener('click', () => {
                toggleBookmark();
            });

            document.getElementById('btnCopy').addEventListener('click', () => {
                copyCurrentContent();
            });

            // [역경 전용 검색] 이벤트 리스너
            const yidoInput = document.getElementById('yidoSearchInput');
            if (yidoInput) {
                yidoInput.addEventListener('input', (e) => {
                    searchYeokdo(e.target.value.trim());
                });
                yidoInput.addEventListener('focus', () => {
                    const menu = document.getElementById('yidoMenu');
                    if (!menu.classList.contains('open')) toggleYidoMenu();
                });
            }
            const yidoClear = document.getElementById('yidoSearchClear');
            if (yidoClear) {
                yidoClear.addEventListener('click', (e) => {
                    e.stopPropagation();
                    yidoInput.value = '';
                    searchYeokdo('');
                });
            }
        });

        // --- Yido (易道) & PDF ---

        function toggleYidoMenu() {
            const menu = document.getElementById('yidoMenu');
            menu.classList.toggle('open');
        }

        function initYidoList() {
            const container = document.getElementById('yidoDynamicList');
            container.innerHTML = '';
            YEOKDO_LIST.forEach(title => {
                const itemWrap = document.createElement('div');
                
                const titleDiv = document.createElement('div');
                titleDiv.className = 'yido-item';
                titleDiv.style.display = 'flex';
                titleDiv.style.justifyContent = 'space-between';
                
                // [수정] 역도 -> 역경 명칭만 변경
                const displayTitle = (title === "역도") ? "역경(易經)" : title;
                titleDiv.innerHTML = `<span>📖 ${displayTitle}</span><span class="sub-arrow" style="transition:transform 0.3s; font-size:10px;">▶</span>`;
                
                const subMenu = document.createElement('div');
                subMenu.className = 'yido-sub-list';
                subMenu.style.display = 'none';
                subMenu.style.paddingLeft = '15px';
                subMenu.style.background = '#fcfcfc';

                titleDiv.onclick = () => {
                    const isOpen = subMenu.style.display === 'block';
                    document.querySelectorAll('.yido-sub-list').forEach(el => el.style.display = 'none');
                    document.querySelectorAll('.sub-arrow').forEach(el => el.style.transform = 'rotate(0deg)');
                    
                    if (!isOpen) {
                        subMenu.style.display = 'block';
                        titleDiv.querySelector('.sub-arrow').style.transform = 'rotate(90deg)';
                    }
                };

                // 서브 목차 추출
                const text = YEOKDO_DATA[title];
                const lines = text.split('\n');
                let cIdx = 0, vIdx = 0;
                lines.forEach(line => {
                    const t = line.trim();
                    if (t.startsWith('# ') || t.startsWith('## ') || t.startsWith('### ')) {
                        const isL1 = t.startsWith('# ');
                        const isL3 = t.startsWith('### ');
                        const label = t.replace(isL1 ? '#' : (isL3 ? '###' : '##'), '').trim();
                        
                        let id;
                        if (isL1) {
                            id = `toc-1-${++cIdx}`;
                        } else if (isL3) {
                            id = `toc-3-${cIdx}-${vIdx++}`;
                        } else {
                            id = `toc-2-${++cIdx}`;
                        }
                        
                        if (!isL3) vIdx = 0;

                        const subItem = document.createElement('div');
                        subItem.style.padding = '10px 5px';
                        subItem.style.fontSize = isL3 ? '13px' : '14px';
                        subItem.style.borderBottom = '1px solid #f0f0f0';
                        subItem.style.color = isL3 ? '#777' : '#B8952E';
                        subItem.style.fontWeight = isL3 ? '400' : '800';
                        const isJeong = (title === "정역(正易)");
                        subItem.style.paddingLeft = isL3 ? '25px' : (isJeong ? '8px' : '10px');
                        subItem.innerText = (isL3 ? '└ ' : (isJeong ? '' : '• ')) + label;
                        subItem.onclick = (e) => {
                            e.stopPropagation();
                            loadYeokdoMobile(title, id);
                        };
                        subMenu.appendChild(subItem);
                    }
                });

                itemWrap.appendChild(titleDiv);
                itemWrap.appendChild(subMenu);
                container.appendChild(itemWrap);
            });
        }

        // [역경 전용 검색 엔진 이식]
        function searchYeokdo(query) {
            const container = document.getElementById('yidoDynamicList');
            const clearBtn = document.getElementById('yidoSearchClear');
            if (clearBtn) clearBtn.style.display = query ? 'block' : 'none';

            if (!query) {
                initYidoList();
                return;
            }

            const q = query.toLowerCase().replace(/\s+/g, '');
            container.innerHTML = '';

            YEOKDO_LIST.forEach(title => {
                const text = YEOKDO_DATA[title];
                const lines = text.split('\n');
                let matches = [];
                let cIdx = 0, vIdx = 0;

                lines.forEach(line => {
                    const t = line.trim();
                    if (t.startsWith('# ')) {
                        cIdx++; vIdx = 0;
                    } else if (t.startsWith('## ')) {
                        cIdx++; vIdx = 0;
                    } else if (t.startsWith('### ')) {
                        vIdx++;
                    }

                    const searchLine = t.toLowerCase().replace(/\s+/g, '');
                    if (searchLine.includes(q) || getChoseong(searchLine).includes(q)) {
                        let id = null;
                        if (t.startsWith('# ')) id = `toc-1-${cIdx}`;
                        else if (t.startsWith('### ')) id = `toc-3-${cIdx}-${vIdx}`;
                        else if (t.startsWith('## ')) id = `toc-2-${cIdx}`;
                        
                        matches.push({ text: t, id: id });
                    }
                });

                if (matches.length > 0) {
                    const group = document.createElement('div');
                    group.style.padding = '8px 0';
                    group.style.borderBottom = '1px solid #f0f0f0';
                    group.innerHTML = `<div style="font-size:11px; color:var(--gold-active); font-weight:800; margin-bottom:4px;">[${title}]</div>`;
                    
                    matches.forEach(m => {
                        const item = document.createElement('div');
                        item.style.padding = '10px 8px';
                        item.style.fontSize = '14px';
                        item.style.color = '#444';
                        item.style.fontWeight = '600';
                        item.innerText = m.text.replace(/^#+\s+/, '');
                        item.onclick = () => loadYeokdoMobile(title, m.id);
                        group.appendChild(item);
                    });
                    container.appendChild(group);
                }
            });

            if (container.innerHTML === '') {
                container.innerHTML = '<div style="padding:40px 0; text-align:center; color:#999; font-size:14px;">검색 결과가 없습니다.</div>';
            }
        }

        function openPDF(filename) {
            window.open(filename, '_blank');
        }

        function loadYeokdoMobile(title, targetId = null) {
            const text = YEOKDO_DATA[title];
            if (!text) return;

            CURRENT_CONTEXT = null;
            updateBookmarkButton();

            document.getElementById('readerTitle').innerText = title;
            document.getElementById('readerContent').innerHTML = formatMD(text);
            
            const layer = document.getElementById('readerLayer');
            layer.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            
            if (targetId) {
                setTimeout(() => {
                    const el = document.getElementById(targetId);
                    if (el) {
                        document.querySelectorAll('.highlight-target').forEach(h => h.classList.remove('highlight-target'));
                        el.classList.add('highlight-target');
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        // [집행 명령] 3초 후 하이라이트 제거
                        setTimeout(() => {
                            el.classList.remove('highlight-target');
                        }, 3000);
                    }
                }, 300);
            } else {
                document.getElementById('readerContent').scrollTop = 0;
            }
        }

        function formatMD(text) {
            const lines = text.split('\n');
            let html = '';
            let cIdx = 0, vIdx = 0;
            for (let line of lines) {
                const t = line.trim();
                if (t.startsWith('### ')) {
                    const id = `toc-3-${cIdx}-${vIdx++}`;
                    html += `<h3 id="${id}">${t.replace('###', '').trim()}</h3>\n`;
                } else if (t.startsWith('## ')) {
                    vIdx = 0;
                    const id = `toc-2-${++cIdx}`;
                    html += `<h2 id="${id}">${t.replace('##', '').trim()}</h2>\n`;
                } else if (t.startsWith('# ')) {
                    vIdx = 0;
                    const id = `toc-1-${++cIdx}`;
                    html += `<h2 id="${id}">${t.replace('#', '').trim()}</h2>\n`;
                } else {
                    html += line + '\n';
                }
            }
            return html;
        }

        // --- 유틸리티 및 데이터 처리 ---

        function getPremiumName(fullName) {
            // [특별 관리] 천지개벽경 시리즈
            if (fullName.includes("안원전")) return "천지개벽경(안원전)";
            if (fullName.includes("정영규")) return "천지개벽경(정영규)";
            if (fullName.includes("이중성")) return "천지개벽경(이중성)";
            
            // [복곡] 대순전경 판본별 독립 복원
            if (fullName.includes("대순전경")) {
                if (fullName.includes("초판")) return "대순전경 초판";
                if (fullName.includes("3판")) return "대순전경 3판";
                if (fullName.includes("6판")) return "대순전경 6판";
                return "대순전경";
            }

            // [정밀 복원] 리드 아키텍트 지시 명칭
            if (fullName.includes("고부인신정기")) return "고부인신정기";
            if (fullName.includes("고사모신정기")) return "고사모신정기";
            if (fullName.includes("보천교 교전")) return "보천교 교전";
            if (fullName.includes("증산천사공사기")) return "증산천사공사기";
            
            // 일반 처리 (괄호 제거 및 공백 정리)
            let name = fullName.split('(')[0].trim();
            if (name.includes("증산도 도전")) return "증산도도전";
            if (name.includes("화은당실기")) return "화은당실기";
            
            // 기타 명칭은 5자 제한 유지 (UI 여백 확보용)
            if (name.length > 5) return name.substring(0, 5);
            return name;
        }

        function getChoseong(text) {
            let result = "";
            for(let i=0; i<text.length; i++) {
                let code = text.charCodeAt(i) - 44032;
                if(code > -1 && code < 11172) {
                    result += CHOSEONG[Math.floor(code / 588)];
                } else {
                    result += text.charAt(i).toLowerCase(); 
                }
            }
            return result;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        // --- 로컬 스토리지 관리 ---

        function getBookmarks() {
            return JSON.parse(localStorage.getItem(STORAGE_KEYS.BOOKMARKS) || '[]');
        }

        function saveRecentSearch(query) {
            if (!query || query.length < 2) return;
            let searches = JSON.parse(localStorage.getItem(STORAGE_KEYS.SEARCHES) || '[]');
            searches = [query, ...searches.filter(s => s !== query)].slice(0, 10);
            localStorage.setItem(STORAGE_KEYS.SEARCHES, JSON.stringify(searches));
        }

        function getRecentSearches() {
            return JSON.parse(localStorage.getItem(STORAGE_KEYS.SEARCHES) || '[]');
        }

        function toggleBookmark() {
            if (!CURRENT_CONTEXT) return;
            let bookmarks = getBookmarks();
            const idx = bookmarks.findIndex(b => b.book === CURRENT_CONTEXT.book && b.text === CURRENT_CONTEXT.text);
            
            if (idx > -1) {
                bookmarks.splice(idx, 1);
                showToast("책갈피에서 삭제되었습니다.");
            } else {
                bookmarks.unshift({ ...CURRENT_CONTEXT });
                if (bookmarks.length > 50) bookmarks.pop();
                showToast("책갈피에 저장되었습니다.");
            }
            localStorage.setItem(STORAGE_KEYS.BOOKMARKS, JSON.stringify(bookmarks));
            updateBookmarkButton();
        }

        function updateBookmarkButton() {
            if (!CURRENT_CONTEXT) return;
            const bookmarks = getBookmarks();
            const exists = bookmarks.some(b => b.book === CURRENT_CONTEXT.book && b.text === CURRENT_CONTEXT.text);
            const btn = document.getElementById('btnBookmark');
            if (exists) {
                btn.classList.add('active');
                btn.innerText = '★';
            } else {
                btn.classList.remove('active');
                btn.innerText = '☆';
            }
        }

        // --- UI 렌더링 ---

        function initFilters() {
            const grid = document.getElementById('filterGrid');
            grid.innerHTML = ""; 
            BIBLE_LIST.forEach(book => {
                const btn = document.createElement('div');
                btn.className = 'filter-item';
                btn.textContent = getPremiumName(book);
                btn.onclick = () => setFilter(book);
                btn.id = `filter-${book.replace(/\s+/g, '-')}`;
                grid.appendChild(btn);
            });
        }

        function renderDashboard() {
            const container = document.getElementById('resultsContainer');
            const bookmarks = getBookmarks();
            const searches = getRecentSearches();

            let html = `<div id="dashboard">`;

            // 최근 검색어
            if (searches.length > 0) {
                html += `
                <div class="dashboard-section">
                    <div class="dashboard-title">최근 검색어</div>
                    <div class="recent-tags">
                        ${searches.map(s => `<span class="tag" onclick="useSearchTag('${s}')">${s}</span>`).join('')}
                    </div>
                </div>`;
            }

            // 책갈피 리스트
            html += `
            <div class="dashboard-section">
                <div class="dashboard-title">책갈피 (★)</div>
                <div class="dashboard-grid">
                    ${bookmarks.length > 0 ? bookmarks.map(b => `
                        <div class="dashboard-item" onclick='openReader("${b.book}", "${b.chapter}", "${b.verse}", ${b.isAggregated}, "", "${b.text}")'>
                            <div class="db-header">${getPremiumName(b.book)} | ${b.chapter} ${b.verse}</div>
                            <div class="db-text">${b.text}</div>
                        </div>
                    `).join('') : '<div class="status-msg" style="margin-top:10px;">저장된 책갈피가 없습니다.</div>'}
                </div>
            </div>`;

            html += `</div>`;
            container.innerHTML = html;
            window.scrollTo(0, 0);
        }

        function useSearchTag(query) {
            document.getElementById('searchInput').value = query;
            performSearch();
        }

        function setFilter(book) {
            SELECTED_BOOK = book;
            document.querySelectorAll('.filter-item').forEach(el => el.classList.remove('active'));
            document.getElementById('allFilterBtn').classList.remove('active');
            if (book === 'all') {
                document.getElementById('allFilterBtn').classList.add('active');
            } else {
                const targetId = `filter-${book.replace(/\s+/g, '-')}`;
                const target = document.getElementById(targetId);
                if (target) target.classList.add('active');
            }
            performSearch();
        }

        function performSearch() {
            const queryRaw = document.getElementById('searchInput').value;
            const query = queryRaw.toLowerCase().trim().replace(/\s+/g, '');
            const container = document.getElementById('resultsContainer');
            
            if (!query && SELECTED_BOOK === 'all') {
                renderDashboard();
                return;
            }

            // if (query) saveRecentSearch(queryRaw.trim()); // [삭제] 입력 리스너에서 1초 지연 후 저장하도록 변경됨

            ALL_RESULTS = [];
            CURRENT_PAGE = 0;
            const targetBooks = SELECTED_BOOK === 'all' ? BIBLE_LIST : [SELECTED_BOOK];

            targetBooks.forEach(bookName => {
                const rawContent = BIBLE_DATA[bookName];
                const cleanContent = rawContent.replace(/!\[.*?\]\(.*?\)/g, '').replace(/<\/?[^>]+(>|$)/g, "");
                const lines = cleanContent.split('\n');
                
                let currentChapter = "";
                let currentVerse = "";
                const seenKeys = new Set(); 
                const isAnwonjeon = bookName.includes('안원전');

                for (let line of lines) {
                    let processedLine = line.trim();
                    if (!processedLine) continue;
                    
                    if (isAnwonjeon && processedLine.includes("天地開闢經 第一篇 辛丑年")) {
                        processedLine = processedLine.replace("天地開闢經 第一篇 辛丑年", "천지개벽경 제1편 신축년");
                        currentChapter = "천지개벽경 제1편 신축년";
                    } else if (processedLine.startsWith('## ')) {
                        currentChapter = processedLine.replace('##', '').trim();
                    } else if (processedLine.startsWith('### ')) {
                        currentVerse = processedLine.replace('###', '').trim();
                    }

                    const searchLine = processedLine.toLowerCase().replace(/\s+/g, '');
                    if (!query || searchLine.includes(query) || getChoseong(searchLine).includes(query)) {
                        let key;
                        if (isAnwonjeon) {
                            key = `${bookName}-${currentChapter}`;
                        } else {
                            key = `${bookName}-${currentChapter}-${currentVerse}`;
                        }

                        if (!seenKeys.has(key)) {
                            let displayLine = processedLine;
                            if (processedLine.startsWith('#')) displayLine = processedLine.replace(/^#+\s+/, '');

                            ALL_RESULTS.push({ 
                                book: bookName, 
                                displayBook: getPremiumName(bookName),
                                chapter: currentChapter, 
                                verse: isAnwonjeon ? "" : currentVerse, 
                                text: displayLine,
                                fullMatchText: processedLine,
                                isAggregated: isAnwonjeon,
                                query: query 
                            });
                            seenKeys.add(key);
                        }
                    }
                }
            });
            renderResults();
        }

        function renderResults() {
            const container = document.getElementById('resultsContainer');
            if (CURRENT_PAGE === 0) {
                container.innerHTML = "";
                window.scrollTo(0, 0);
            }

            if (ALL_RESULTS.length === 0) {
                container.innerHTML = `<div class="status-msg">해당하는 성구가 없습니다.</div>`;
                return;
            }

            const chunk = ALL_RESULTS.slice(CURRENT_PAGE * PAGE_SIZE, (CURRENT_PAGE + 1) * PAGE_SIZE);

            chunk.forEach(item => {
                const div = document.createElement('div');
                div.className = 'match-item';
                const locStr = `${item.chapter}${item.verse ? ' ' + item.verse : ''}`;
                div.innerHTML = `
                    <div class="match-header">${item.displayBook} | ${locStr}</div>
                    <div class="match-text">${item.text}</div>
                `;
                div.onclick = () => openReader(item.book, item.chapter, item.verse, item.isAggregated, item.query, item.fullMatchText);
                container.appendChild(div);
            });

            const oldBtn = document.getElementById('loadMoreBtn');
            if (oldBtn) oldBtn.remove();
            if (ALL_RESULTS.length > (CURRENT_PAGE + 1) * PAGE_SIZE) {
                const btn = document.createElement('button');
                btn.id = 'loadMoreBtn';
                btn.className = 'load-more-btn';
                btn.textContent = `결과 더보기 (${(CURRENT_PAGE + 1) * PAGE_SIZE} / ${ALL_RESULTS.length})`;
                btn.onclick = (e) => { 
                    e.stopPropagation();
                    CURRENT_PAGE++; 
                    renderResults(); 
                };
                container.appendChild(btn);
            }
        }

        async function openReader(bookName, targetChapter, targetVerse, isAggregated, highlightQuery, targetLineText) {
            const layer = document.getElementById('readerLayer');
            const content = document.getElementById('readerContent');
            const title = document.getElementById('readerTitle');
            
            title.textContent = getPremiumName(bookName);
            
            const rawData = BIBLE_DATA[bookName].replace(/!\[.*?\]\(.*?\)/g, '');
            const lines = rawData.split('\n');
            
            let html = "";
            let currentChapter = "";
            let currentVerse = "";
            let firstMatchIdInReader = "";

            if (bookName === '동곡비서') {
                let foundChapter = "";
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    const match = line.match(/^<(\d+)>(.*)/);
                    if (match) {
                        foundChapter = `<${match[1]}>`;
                    }
                    // [최종 패치] 장 번호 포함 매칭 보장
                    if (line.includes(targetLineText)) {
                        targetChapter = foundChapter;
                        break;
                    }
                }
            }

            // 현재 컨텍스트 업데이트
            CURRENT_CONTEXT = {
                book: bookName,
                chapter: targetChapter,
                verse: targetVerse,
                isAggregated: isAggregated,
                text: targetLineText.replace(/^#+\s+/, '')
            };
            updateBookmarkButton();

            lines.forEach((line, idx) => {
                let processedLine = line.trim();
                if (!processedLine) return;
                
                let displayLine = processedLine;
                if (bookName === '동곡비서') {
                    const match = processedLine.match(/^<(\d+)>(.*)/);
                    if (match) {
                        currentChapter = `<${match[1]}>`;
                        displayLine = `${match[1]}. ${match[2].trim()}`;
                    }
                } else if (bookName.includes('안원전') && processedLine.includes("天地開闢經 第一篇 辛丑年")) {
                    processedLine = processedLine.replace("天地開闢經 第一篇 辛丑年", "천지개벽경 제1편 신축년");
                    currentChapter = "천지개벽경 제1편 신축년";
                    currentVerse = "";
                } else if (processedLine.startsWith('## ')) {
                    currentChapter = processedLine.replace('##', '').trim();
                } else if (processedLine.startsWith('### ')) {
                    currentVerse = processedLine.replace('###', '').trim();
                }

                if (currentChapter === targetChapter) {
                    const lineId = `reader-line-${idx}`;
                    // [최종 패치] 포함 매칭 방식 적용
                    let isSpecialMatch = (processedLine.includes(targetLineText));
                    
                    if (isSpecialMatch && !firstMatchIdInReader) {
                        firstMatchIdInReader = (bookName === '동곡비서') ? 'target-focus' : lineId;
                    }

                    if (processedLine.startsWith('## ')) {
                        html += `<h2 id="${lineId}">${currentChapter}</h2>`;
                    } else if (processedLine.startsWith('### ')) {
                        html += `<h3 id="${lineId}">${currentVerse}</h3>`;
                    } else if (!processedLine.startsWith('#')) {
                        const cleanLine = processedLine.toLowerCase().replace(/\s+/g, '');
                        let shouldHighlight = isSpecialMatch || (highlightQuery && (cleanLine.includes(highlightQuery) || getChoseong(cleanLine).includes(highlightQuery)));
                        
                        const pId = (isSpecialMatch && bookName === '동곡비서') ? 'id="target-focus"' : `id="${lineId}"`;
                        const pClass = shouldHighlight ? (isSpecialMatch && bookName === '동곡비서' ? 'highlight-target' : 'highlight-verse') : '';
                        
                        html += `<p ${pId} class="${pClass}">${displayLine}</p>`;
                    }
                }
            });

            content.innerHTML = html || "<p style='text-align:center; padding-top:40px;'>해당 섹션의 내용을 찾을 수 없습니다.</p>";
            layer.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            // [집행 명령] 중앙 안착 및 500ms 지연 스크롤 보장
            const waitTime = (bookName === '동곡비서') ? 500 : 300;
            setTimeout(() => {
                requestAnimationFrame(() => {
                    const targetId = (bookName === '동곡비서') ? 'target-focus' : firstMatchIdInReader;
                    const targetEl = document.getElementById(targetId);
                    if (targetEl) {
                        targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else {
                        content.scrollTop = 0;
                    }
                });
            }, waitTime);
        }

        function copyCurrentContent() {
            if (!CURRENT_CONTEXT) return;
            
            // [경전명 장:절] 내용 형식을 위한 포맷팅
            const bookName = getPremiumName(CURRENT_CONTEXT.book);
            const chapter = CURRENT_CONTEXT.chapter;
            let verse = CURRENT_CONTEXT.verse;

            // 천지개벽경 등 절 구분이 특이한 경우 처리
            let sourceLabel = `[${bookName} ${chapter}${verse ? ' ' + verse : ''}]`;
            
            // 만약 장 이름에 이미 절이 포함되어 있거나 형식을 맞추고 싶다면
            if (verse && !isNaN(verse.replace(/[^0-9]/g, ''))) {
                const vNum = verse.replace(/[^0-9]/g, '');
                sourceLabel = `[${bookName} ${chapter}:${vNum}절]`;
            } else if (verse) {
                sourceLabel = `[${bookName} ${chapter} ${verse}]`;
            }

            const fullText = `${sourceLabel} ${CURRENT_CONTEXT.text}`;
            
            navigator.clipboard.writeText(fullText).then(() => {
                showToast("출처와 함께 복사되었습니다.");
            }).catch(err => {
                showToast("복사에 실패했습니다.");
            });
        }
    </script>
