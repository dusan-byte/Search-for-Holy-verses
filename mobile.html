<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성구(原典) 검색 v1.0 M</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --bg-accent: #16161a;
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #e8e8e8;
            --text-secondary: #9aa0a6;
            --font-main: "Apple SD Gothic Neo", "Nanum Myeongjo", "Batang", serif;
        }

        body, html {
            margin: 0; padding: 0; background-color: var(--bg-dark);
            color: var(--text-primary); font-family: var(--font-main);
            height: 100%; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }

        .mobile-container {
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* 헤더: 검색바 고정 */
        .app-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10, 10, 12, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border); padding: 16px;
        }

        .search-box {
            display: flex; background: var(--bg-accent);
            border: 1px solid var(--glass-border); border-radius: 12px;
            padding: 4px 12px; align-items: center;
        }

        #searchInput {
            flex-grow: 1; background: transparent; border: none; outline: none;
            color: var(--text-primary); font-size: 16px; padding: 12px 0;
            font-family: inherit;
        }

        .clear-btn {
            color: var(--text-secondary); padding: 8px; cursor: pointer;
            font-size: 20px;
        }

        /* 결과 창 */
        .results-container {
            flex-grow: 1; padding: 20px;
        }

        .status-msg {
            text-align: center; color: var(--text-secondary); margin-top: 40px;
            font-size: 14px; line-height: 1.6;
        }

        .match-item {
            margin-bottom: 24px; animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .match-header {
            font-size: 14px; color: var(--gold); margin-bottom: 8px;
            font-weight: 600; display: flex; align-items: center; gap: 6px;
        }

        .match-text {
            background: var(--glass-bg); border-left: 3px solid var(--gold);
            padding: 14px 16px; border-radius: 0 8px 8px 0;
            font-size: 16px; line-height: 1.8; color: var(--text-primary);
            cursor: pointer; transition: background 0.2s;
        }

        .match-text:active { background: var(--gold-dim); }

        .load-more-btn {
            display: block; width: 100%; padding: 16px; margin: 20px 0 40px;
            background: transparent; border: 1px solid var(--gold);
            color: var(--gold); border-radius: 12px; font-weight: 600;
            cursor: pointer; font-family: inherit;
        }

        /* 푸터: PC 버전 링크 */
        .app-footer {
            padding: 30px 16px; text-align: center; border-top: 1px solid var(--glass-border);
        }

        .pc-link {
            color: var(--text-secondary); text-decoration: none; font-size: 13px;
            border-bottom: 1px solid var(--text-secondary); padding-bottom: 2px;
        }

        /* 전면 레이어 (독서모드) */
        #readerLayer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px);
            z-index: 200; display: none; flex-direction: column;
            animation: slideUp 0.3s cubic-bezier(0, 0, 0.2, 1);
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .reader-header {
            padding: 16px 20px; border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .reader-title { font-size: 18px; font-weight: 700; color: var(--gold); }

        .close-btn {
            font-size: 24px; color: var(--text-primary); background: transparent;
            border: none; cursor: pointer; padding: 10px;
        }

        .reader-content {
            flex-grow: 1; overflow-y: auto; padding: 30px 24px 80px;
            line-height: 2.1; font-size: 17px;
        }

        .reader-content h2 { color: var(--gold); font-size: 20px; border-bottom: 1px dashed var(--gold-dim); padding-bottom: 10px; margin-top: 40px; }
        .reader-content h3 { color: var(--gold-hover); font-size: 16px; margin-top: 30px; }
        .reader-content p { color: var(--text-primary); margin-bottom: 20px; border-left: 1px solid var(--glass-border); padding-left: 14px; }

        .highlight-verse { background: var(--gold-dim); border-left-color: var(--gold) !important; color: var(--gold) !important; font-weight: 600; }
    </style>
</head>
<body>
    <div class="mobile-container">
        <header class="app-header">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="성구/초성 검색 (예: ㅈㅅ)" autocomplete="off">
                <span class="clear-btn" id="clearBtn">&times;</span>
            </div>
        </header>

        <main class="results-container" id="resultsContainer">
            <div class="status-msg" id="statusMsg">
                <strong>성구(原典) 검색 v1.0</strong><br>
                검색어를 입력하시면 28권의 데이터에서 찾아드립니다.
            </div>
        </main>

        <footer class="app-footer">
            <a href="index.html?mode=pc" class="pc-link">PC 버전으로 보기</a>
            <p style="font-size: 10px; color: var(--text-secondary); margin-top: 15px; opacity: 0.5;">© Hyunmu Scripture Engine</p>
        </footer>
    </div>

    <!-- 상세 열람 레이어 -->
    <div id="readerLayer">
        <header class="reader-header">
            <span class="reader-title" id="readerTitle">성구 전문</span>
            <button class="close-btn" id="closeReader">&times;</button>
        </header>
        <div class="reader-content" id="readerContent"></div>
    </div>

    <script src="data.js"></script>
    <script>
        let BIBLE_DATA = {};
        let ALL_RESULTS = [];
        let CURRENT_PAGE = 0;
        const PAGE_SIZE = 20;

        const CHOSEONG = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

        document.addEventListener("DOMContentLoaded", () => {
            if (typeof window.BIBLE_DATA_RAW !== 'undefined') {
                BIBLE_DATA = window.BIBLE_DATA_RAW;
                console.log("✅ 데이터 로드 완료");
            } else {
                document.getElementById('statusMsg').innerHTML = "데이터를 불러올 수 없습니다. data.js를 확인하세요.";
            }

            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim().replace(/\s+/g, '');
                if (query.length === 0) {
                    resetResults();
                    return;
                }
                performSearch(query);
            });

            document.getElementById('clearBtn').addEventListener('click', () => {
                searchInput.value = '';
                resetResults();
                searchInput.focus();
            });

            document.getElementById('closeReader').addEventListener('click', () => {
                document.getElementById('readerLayer').style.display = 'none';
                document.body.style.overflow = 'auto';
            });
        });

        function getChoseong(text) {
            let result = "";
            for(let i=0; i<text.length; i++) {
                let code = text.charCodeAt(i) - 44032;
                if(code > -1 && code < 11172) {
                    result += CHOSEONG[Math.floor(code / 588)];
                } else {
                    result += text.charAt(i).toLowerCase(); 
                }
            }
            return result;
        }

        function resetResults() {
            ALL_RESULTS = [];
            CURRENT_PAGE = 0;
            document.getElementById('resultsContainer').innerHTML = `
                <div class="status-msg">
                    <strong>성구(原典) 검색 v1.0</strong><br>
                    검색어를 입력하시면 28권의 데이터에서 찾아드립니다.
                </div>
            `;
        }

        function performSearch(query) {
            ALL_RESULTS = [];
            CURRENT_PAGE = 0;

            for (const bookName in BIBLE_DATA) {
                const text = BIBLE_DATA[bookName].replace(/!\[.*?\]\(.*?\)/g, '').replace(/<\/?[^>]+(>|$)/g, "");
                const lines = text.split('\n');
                let currentChapter = "";
                let currentVerse = "";

                for (let line of lines) {
                    line = line.trim();
                    if (!line) continue;
                    if (line.startsWith('## ')) currentChapter = line.replace('##', '').trim();
                    else if (line.startsWith('### ')) currentVerse = line.replace('###', '').trim();
                    else if (!line.startsWith('#')) {
                        const rawLine = line.toLowerCase().replace(/\s+/g, '');
                        if (rawLine.includes(query) || getChoseong(rawLine).includes(query)) {
                            ALL_RESULTS.push({
                                book: bookName,
                                chapter: currentChapter,
                                verse: currentVerse,
                                text: line
                            });
                        }
                    }
                }
            }
            renderResults();
        }

        function renderResults() {
            const container = document.getElementById('resultsContainer');
            if (CURRENT_PAGE === 0) container.innerHTML = "";

            if (ALL_RESULTS.length === 0) {
                container.innerHTML = `<div class="status-msg">검색 결과가 없습니다.</div>`;
                return;
            }

            const start = CURRENT_PAGE * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            const chunk = ALL_RESULTS.slice(start, end);

            chunk.forEach(item => {
                const div = document.createElement('div');
                div.className = 'match-item';
                div.innerHTML = `
                    <div class="match-header">${item.book} > ${item.chapter} ${item.verse ? '> ' + item.verse : ''}</div>
                    <div class="match-text" onclick="openReader('${item.book}', '${item.text}')">${item.text}</div>
                `;
                container.appendChild(div);
            });

            // 더보기 버튼
            const existingBtn = document.getElementById('loadMoreBtn');
            if (existingBtn) existingBtn.remove();

            if (ALL_RESULTS.length > end) {
                const btn = document.createElement('button');
                btn.id = 'loadMoreBtn';
                btn.className = 'load-more-btn';
                btn.textContent = `결과 더보기 (${end}/${ALL_RESULTS.length})`;
                btn.onclick = () => {
                    CURRENT_PAGE++;
                    renderResults();
                };
                container.appendChild(btn);
            }
        }

        function openReader(bookName, verseText) {
            const layer = document.getElementById('readerLayer');
            const content = document.getElementById('readerContent');
            const title = document.getElementById('readerTitle');

            title.textContent = bookName;
            let rawText = BIBLE_DATA[bookName].replace(/!\[.*?\]\(.*?\)/g, '').replace(/<\/?[^>]+(>|$)/g, "");
            
            const lines = rawText.split('\n');
            let html = "";
            let targetId = "";

            lines.forEach((line, idx) => {
                line = line.trim();
                if (!line) return;

                if (line.startsWith('## ')) {
                    html += `<h2>${line.replace('##', '')}</h2>`;
                } else if (line.startsWith('### ')) {
                    html += `<h3>${line.replace('###', '')}</h3>`;
                } else if (!line.startsWith('#')) {
                    const isMatch = line === verseText;
                    const id = isMatch ? "target-verse" : "";
                    html += `<p class="${isMatch ? 'highlight-verse' : ''}" ${isMatch ? 'id="target-verse"' : ''}>${line}</p>`;
                }
            });

            content.innerHTML = html;
            layer.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            // 타겟 구절로 이동
            setTimeout(() => {
                const target = document.getElementById('target-verse');
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    content.scrollTop = 0;
                }
            }, 100);
        }
    </script>
</body>
</html>
