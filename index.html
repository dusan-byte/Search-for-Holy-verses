<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <!-- 캐시 방지 (무조건 새로고침) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyunmu 1.3</title>
    <!-- [미학적 고도화] 고전 서체 라이브러리 임포트 -->
    <link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=Noto+Serif+KR:wght@400;700;900&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <script>
        // [무조건 반사] 모바일 강제 리다이렉트 (768px 미만 또는 Mobile UA)
        if (window.innerWidth < 768 || /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            if (!window.location.search.includes('mode=pc')) {
                window.location.replace("mobile.html");
            }
        }
    </script>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --bg-accent: #16161a;
            --gold: #d4af37;
            --gold-hover: #ebd076;
            --gold-dim: rgba(212, 175, 55, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --text-primary: #e8e8e8;
            --text-secondary: #9aa0a6;
            --gold-premium: #f3d47a;
            --font-title: 'Song Myung', serif;
            --font-main: 'Noto Serif KR', serif;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: var(--font-main);
            background-color: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            background: radial-gradient(circle at 50% 50%, var(--gold-dim) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .app-container {
            display: flex;
            height: 100vh;
            padding: 24px;
            box-sizing: border-box;
            gap: 24px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
        }

        #sidebar {
            width: 340px;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
        }

        #sidebar.collapsed {
            width: 0;
            padding: 0;
            border: none;
            margin-left: -24px;
            opacity: 0;
            pointer-events: none;
        }

        .sidebar-header {
            padding: 30px 24px 15px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .sidebar-header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
            font-family: var(--font-title);
        }

        .brand-name {
            font-size: 20px;
            color: var(--gold);
            font-weight: 800;
            letter-spacing: 1px;
            margin-top: 8px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            font-family: 'Outfit', sans-serif;
        }

        .sidebar-section-title {
            padding: 16px 24px 0.8rem;
            font-size: 1.25rem;
            color: #ffd700;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-top: 1px solid var(--glass-border);
            margin-top: 20px;
            opacity: 1;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
            font-family: var(--font-title);
        }

        #readerContent {
            white-space: pre-wrap !important;
            line-height: 1.75;
            font-family: var(--font-main);
            color: #eee;
            font-size: 1.15rem;
            letter-spacing: -0.01em;
        }

        .search-container {
            padding: 20px 24px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .global-search-btn {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: none;
            color: var(--gold);
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .global-search-btn.active,
        .global-search-btn:hover {
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
            box-shadow: 0 0 15px var(--gold-dim);
        }

        .search-input-wrapper {
            position: relative;
            width: 100%;
        }

        .search-input-wrapper input {
            width: 100%;
            padding: 14px 35px 14px 40px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.2);
            border: none;
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input-wrapper input:focus {
            box-shadow: 0 0 12px var(--gold-dim);
        }

        #yeokdoSearchInput {
            width: 100%;
            padding: 12px 35px 12px 40px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.2);
            border: none;
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
        }

        #yeokdoSearchInput:focus {
            box-shadow: 0 0 12px var(--gold-dim);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold-premium);
            font-size: 15px;
            pointer-events: none;
            opacity: 0.7;
            z-index: 5;
        }

        .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            display: none;
            z-index: 10;
        }

        .clear-btn:hover {
            color: var(--gold);
        }

        .search-history {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .history-badge {
            background: rgba(212, 175, 55, 0.08);
            border: none;
            color: var(--gold);
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
        }

        .history-badge:hover {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 8px var(--gold-dim);
        }

        .book-list-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(212, 175, 55, 0.6);
        }

        .book-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .book-item {
            cursor: pointer;
            font-size: 15px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            display: flex;
            flex-direction: column;
        }

        .book-item-title {
            padding: 8px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            letter-spacing: 0.5px;
            font-family: var(--font-title);
            font-weight: 500;
        }

        .arrow-icon {
            font-size: 10px;
            transition: transform 0.3s ease;
            opacity: 0.5;
        }

        .book-item.active .arrow-icon {
            transform: rotate(90deg);
            opacity: 1;
            color: var(--gold);
        }

        .book-item:hover .book-item-title {
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold-premium);
        }

        .book-item.active {
            color: var(--gold);
            border-left-color: var(--gold);
        }

        .book-item.active .book-item-title {
            background: var(--gold-dim);
            font-weight: 600;
            color: var(--gold);
        }

        .toc-container {
            display: none;
            flex-direction: column;
            padding: 10px 24px 15px 34px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .book-item.active .toc-container {
            display: flex;
        }

        .toc-item {
            font-size: 13px;
            color: var(--text-secondary);
            padding: 4px 12px;
            margin-bottom: 1px;
            border-radius: 6px;
            transition: all 0.2s ease;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
            border-left: 1px solid var(--glass-border);
            font-family: var(--font-title);
        }

        .toc-item:hover {
            background: rgba(212, 175, 55, 0.08);
            color: var(--gold-premium);
            border-left-color: var(--gold);
        }

        .toc-item.level-2 {
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 8px;
            border-left-color: rgba(212, 175, 55, 0.5);
        }

        .yeokdo-h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--gold-premium);
            margin-top: 30px;
            margin-bottom: 20px;
            display: block;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
            font-family: var(--font-title);
            text-align: center;
            scroll-margin-top: 150px;
        }

        .yeokdo-h2 {
            font-size: 22px;
            font-weight: bold;
            color: #e2b808;
            margin-top: 25px;
            margin-bottom: 15px;
            display: block;
            border-bottom: 1px solid rgba(226, 184, 8, 0.2);
            padding-bottom: 8px;
            font-family: var(--font-title);
            scroll-margin-top: 150px;
        }

        .yeokdo-h3 {
            font-size: 18px;
            font-weight: bold;
            color: var(--text-primary);
            margin-top: 20px;
            margin-bottom: 10px;
            display: block;
            border-left: 3px solid var(--gold);
            padding-left: 10px;
            font-family: var(--font-title);
            scroll-margin-top: 150px;
        }

        /* 주역/정역/십익 집중 조명 효과 */
        .hexagram-focus-title {
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.6);
            color: var(--gold-premium) !important; /* 차분한 황금빛 */
            font-weight: 800;
            transition: all 0.4s ease;
            display: inline-block;
        }
        
        .hexagram-container, .yeokdo-section-container {
            scroll-margin-top: 150px; /* 상단 헤더 완벽 회피 */
            margin-bottom: 80px;
            padding: 40px 20px;
            border-bottom: 1px solid rgba(212,175,55,0.05);
            transition: all 0.4s ease;
            opacity: 1 !important; /* Zero-Dimmed Policy: 항상 100% 선명도 유지 */
        }

        .hexagram-container.focus-active, .yeokdo-section-container.focus-active {
            opacity: 1 !important;
            filter: drop-shadow(0 0 5px rgba(212,175,55,0.1));
            z-index: 10;
        }
        
        .hexagram-container.focus-active .verse-text, 
        .yeokdo-section-container.focus-active .verse-text,
        .hexagram-container.focus-active .yeokdo-h3,
        .yeokdo-section-container.focus-active .yeokdo-h3,
        .hexagram-container.focus-active .yeokdo-h2,
        .yeokdo-section-container.focus-active .yeokdo-h2 {
            opacity: 1 !important;
            transition: all 0.4s ease;
        }

        .hexagram-container.dimmed, .yeokdo-section-container.dimmed {
            opacity: 1 !important; /* 비활성 섹션 어두워짐 전면 차단 */
            filter: none !important;
        }

        .toc-number-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            padding: 10px 5px;
        }
        .toc-number-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toc-number-item:hover {
            background: var(--gold-dim);
            color: var(--gold);
            border-color: var(--gold);
        }
        .toc-number-item.active {
            background: var(--gold);
            color: var(--bg-dark);
            border-color: var(--gold-premium);
            font-weight: 800;
            box-shadow: 0 0 10px rgba(212,175,55,0.5);
        }

        .main-view {
            flex-grow: 1;
            overflow: hidden;
            position: relative;
        }

        .main-header {
            padding: 30px 40px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .main-header h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            color: var(--gold);
            font-family: var(--font-title);
        }

        .content-area {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            scroll-behavior: smooth;
            height: calc(100% - 90px);
            box-sizing: border-box;
        }

        .welcome-message {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 100px;
            font-size: 18px;
            line-height: 1.8;
        }

        .welcome-message strong {
            color: var(--gold);
        }

        .chapter-header {
            font-size: 22px;
            color: var(--text-primary);
            margin: 40px 0 20px;
            font-weight: 600;
            border-bottom: 1px dashed var(--glass-border);
            padding-bottom: 10px;
        }

        .verse-header {
            font-size: 16px;
            color: var(--gold);
            margin: 30px 0 10px;
            font-weight: 600;
        }

        .verse-text {
            font-size: 1.1rem;
            line-height: 1.75;
            color: var(--text-secondary);
            margin-bottom: 15px;
            padding-left: 15px;
            border-left: 2px solid var(--glass-border);
            font-family: var(--font-main);
            letter-spacing: -0.01em;
            scroll-margin-top: 150px; /* 정밀 스크롤 오프셋 확보 */
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .verse-text:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.02);
        }

        .floating-toggle-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--bg-accent);
            border: 1px solid var(--glass-border);
            color: var(--gold);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: var(--glass-shadow);
            transition: all 0.3s ease;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .floating-toggle-btn:hover {
            background: var(--gold-dim);
            border-color: var(--gold);
            transform: translateY(-3px);
        }

        .search-result-book {
            font-size: 18px;
            color: var(--gold);
            margin: 40px 0 15px;
            font-weight: 700;
            border-bottom: 1px solid var(--gold-dim);
            padding-bottom: 8px;
        }

        .target-highlight {
            background-color: rgba(212, 175, 55, 0.1) !important;
            border-left: 3px solid var(--gold) !important;
            padding: 10px 15px !important;
            border-radius: 6px !important;
            color: var(--text-primary) !important;
            font-weight: 600 !important;
            transition: all 0.4s ease;
            margin: 12px 0 !important;
        }

        .search-result-item:hover {
            background: rgba(255, 255, 255, 0.05) !important;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(212, 175, 55, 0.9);
            color: var(--bg-dark);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: bold;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, 10px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 0;
                gap: 0;
            }

            #sidebar {
                position: fixed;
                left: -300px;
                top: 0;
                bottom: 0;
                width: 300px;
                z-index: 1000;
                border-radius: 0;
                transition: left 0.3s ease;
            }

            #sidebar.show {
                left: 0;
            }

            .main-view {
                border-radius: 0;
                height: 100vh;
                width: 100vw;
            }

            .main-header {
                padding: 15px 20px;
            }

            .main-header h2 {
                font-size: 20px;
            }

            .content-area {
                padding: 20px;
                height: calc(100% - 60px);
            }

            .sidebar-header {
                padding: 40px 20px 20px;
            }

            .sidebar-header h1 {
                font-size: 22px;
            }

            .book-item-title {
                padding: 16px 24px;
                font-size: 16px;
            }

            .toc-item {
                padding: 12px 16px;
                font-size: 14px;
                margin-bottom: 4px;
            }

            .floating-toggle-btn {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
            }

            .welcome-message {
                margin-top: 60px;
                font-size: 16px;
            }

            .verse-text {
                font-size: 16px;
                white-space: pre-wrap;
                font-family: 'Noto Serif KR', serif;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <aside id="sidebar" class="glass-panel">
            <div class="sidebar-header">
                <h1 style="margin: 0; padding: 10px 0; font-size: 20px; color: var(--gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); font-weight: 800; line-height: 1.4;">
                    <div style="display: block;">성구(原典) 검색</div>
                    <div style="display: block; font-size: 0.85em; font-weight: 600; margin-left: 25px; opacity: 0.95;">Hyunmu 1.3</div>
                </h1>
            </div>
            <div class="search-container">
                <button id="globalSearchBtn" class="global-search-btn">전체 경전 검색</button>
                <div class="search-input-wrapper" style="margin-top: 12px;">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="성구/초성 검색 (예: ㅈㅅ)">
                    <span class="clear-btn" id="searchClearBtn">✕</span>
                </div>
                <div id="searchHistory" class="search-history"></div>
            </div>
            <div class="book-list-container">
                <div class="sidebar-section-title" style="margin-top:0; border-top:none;">현무경 (PDF)</div>
                <ul class="book-list">
                    <li class="book-item">
                        <div class="book-item-title" onclick="window.open('현무경(법종교).pdf', '_blank')"><span>현무경 (법종교)</span><span class="arrow-icon">▶</span></div>
                    </li>
                    <li class="book-item">
                        <div class="book-item-title" onclick="window.open('현무경(순천도).pdf', '_blank')"><span>현무경 (순천도)</span><span class="arrow-icon">▶</span></div>
                    </li>
                </ul>

                <div class="sidebar-section-title">
                    <span>역경(易經)</span>
                </div>
                <div style="padding: 0 24px 1.5rem;">
                    <div class="search-input-wrapper">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="yeokdoSearchInput" placeholder="역경 전용 검색...">
                        <span class="clear-btn" id="yeokdoClearBtn">✕</span>
                    </div>
                </div>
                <ul id="yeokdoList" class="book-list"></ul>

                <div class="sidebar-section-title">성구 (原典)</div>
                <ul id="bookList" class="book-list"></ul>
            </div>
        </aside>
        <main id="mainView" class="glass-panel main-view">
            <header class="main-header">
                <h2 id="currentTitle">데이터 로드 중...</h2>
            </header>
            <div id="contentArea" class="content-area">
                <div id="welcomeScreen" class="welcome-message">
                    <h2 style="color: var(--gold); margin-bottom: 20px;">Hyunmu 1.3</h2>
                    가장 최신의 성구 검색 엔진과<br>
                    역경(易經) 라이브러리를 경험해 보세요.
                </div>
                <div id="searchResultsArea" style="display: none;"></div>
                <div id="readerContent" style="display: none;"></div>
            </div>
            <button id="tocToggleBtn" class="floating-toggle-btn" title="목차 열기/닫기">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </main>
    </div>
    
    <div id="toast"></div>

    <script src="data.js" charset="utf-8"></script>
    <script src="data_md.js" charset="utf-8"></script>
    <script>
        console.log("🚀 성구 데이터를 로컬 자바스크립트로 초기화합니다...");
        let BIBLE_DATA = {};
        let BIBLE_LIST = [];
        let YEOKDO_DATA_ALL = {};
        let YEOKDO_MAP = {
            "십익(十翼)": "십익",
            "정역(正易)": "정역",
            "주역(周易) 64괘(數)": "주역_수",
            "주역(周易) 64괘(한글)": "주역_한글"
        };
        let YEOKDO_BOOKS = ["십익(十翼)", "정역(正易)", "주역(周易) 64괘(數)", "주역(周易) 64괘(한글)"];
        let isGlobalSearch = false;

        const HISTORY_KEY = 'hyunmu_pc_search_history';

        document.addEventListener("DOMContentLoaded", () => {
            if (typeof window.BIBLE_DATA_RAW !== 'undefined') {
                BIBLE_DATA = window.BIBLE_DATA_RAW;
                BIBLE_LIST = Object.keys(BIBLE_DATA).sort();
                
                if (typeof YEOKDO_DATA !== 'undefined') {
                    YEOKDO_DATA_ALL = YEOKDO_DATA;
                }
                
                console.log(`✅ 데이터 로드 완료: ${BIBLE_LIST.length}권의 경전 / 역경 4책`);

                initApp();
            } else {
                console.error("데이터 초기화 실패: data.js 파일을 찾을 수 없습니다.");
                document.getElementById('currentTitle').innerHTML = "데이터 로딩 오류!";
            }
        });

        const CHOSEONG = ["ㄱ", "ㄲ", "ㄴ", "ㄷ", "ㄸ", "ㄹ", "ㅁ", "ㅂ", "ㅃ", "ㅅ", "ㅆ", "ㅇ", "ㅈ", "ㅉ", "ㅊ", "ㅋ", "ㅌ", "ㅍ", "ㅎ"];

        function getChoseong(text) {
            let result = "";
            for (let i = 0; i < text.length; i++) {
                let code = text.charCodeAt(i) - 44032;
                if (code > -1 && code < 11172) {
                    result += CHOSEONG[Math.floor(code / 588)];
                } else {
                    result += text.charAt(i).toLowerCase();
                }
            }
            return result;
        }

        function cleanMarkdown(mdText) {
            let text = mdText.replace(/!\[.*?\]\(.*?\)/g, '');
            text = text.replace(/<(?!\d+>)\/?[^>]+(>|$)/g, "");
            return text;
        }

        function debounce(func, delay) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), delay);
            };
        }

        function getSearchHistory() { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }

        function saveSearchHistory(query) {
            if (!query) return;
            let history = getSearchHistory();
            history = [query, ...history.filter(q => q !== query)].slice(0, 5);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            renderSearchHistory();
        }

        function renderSearchHistory() {
            const history = getSearchHistory();
            const container = document.getElementById('searchHistory');
            container.innerHTML = history.map(q => `<span class="history-badge" onclick="useSearchHistory('${q}')">${q}</span>`).join('');
        }

        function useSearchHistory(query) {
            const input = document.getElementById('searchInput');
            input.value = query;
            document.getElementById('searchClearBtn').style.display = 'block';
            doBibleSearch(query, isGlobalSearch);
        }

        function getFormattedSource(elementId) {
            const el = document.getElementById(elementId);
            if (!el) return "";
            const bookName = window.currentBookName;
            let chapter = "", verse = "";
            let prev = el.previousElementSibling;
            while (prev) {
                if (prev.tagName === "H3" && !verse) verse = prev.innerText.trim();
                if (prev.tagName === "H2" && !chapter) chapter = prev.innerText.trim();
                if (chapter && verse) break;
                prev = prev.previousElementSibling;
            }
            let text = el.innerText.trim();
            let location = [];
            if (chapter) location.push(chapter);
            if (verse) location.push(verse);
            return `${text}\n\n『${bookName}${location.length > 0 ? " " + location.join(" ") : ""}』`;
        }

        function copyToClipboard(elementId) {
            navigator.clipboard.writeText(getFormattedSource(elementId)).then(() => showToast("📜 복사되었습니다."));
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 1500);
        }

        function initApp() {
            const bookListEl = document.getElementById('bookList');
            const yeokdoListEl = document.getElementById('yeokdoList');

            YEOKDO_BOOKS.forEach(displayName => {
                const li = document.createElement('li');
                li.className = 'book-item';
                li.dataset.book = displayName;
                const titleDiv = document.createElement('div');
                titleDiv.className = 'book-item-title';
                titleDiv.innerHTML = `<span>${displayName}</span><span class="arrow-icon">▶</span>`;
                titleDiv.onclick = (e) => {
                    e.stopPropagation();
                    loadYeokdo(displayName);
                };
                li.appendChild(titleDiv);
                const tocUl = document.createElement('ul');
                tocUl.className = 'toc-container';
                tocUl.style.listStyle = 'none';
                tocUl.style.padding = '10px 24px 15px 34px'; // 기존 CSS 패딩 적용
                tocUl.id = `toc-yeokdo-${displayName.replace(/\s+/g, '-')}`;
                li.appendChild(tocUl);
                yeokdoListEl.appendChild(li);
            });

            BIBLE_LIST.forEach(book => {
                const li = document.createElement('li');
                li.className = 'book-item';
                li.dataset.book = book;
                const titleDiv = document.createElement('div');
                titleDiv.className = 'book-item-title';
                titleDiv.innerHTML = `<span>${book}</span><span class="arrow-icon">▶</span>`;
                titleDiv.onclick = () => loadScripture(book);
                li.appendChild(titleDiv);
                const tocDiv = document.createElement('div');
                tocDiv.className = 'toc-container';
                tocDiv.id = `toc-${book.replace(/\s+/g, '-')}`;
                li.appendChild(tocDiv);
                bookListEl.appendChild(li);
            });

            const searchInput = document.getElementById('searchInput');
            const yeokdoSearchInput = document.getElementById('yeokdoSearchInput');

            searchInput.addEventListener('input', debounce((e) => {
                const query = e.target.value.trim();
                yeokdoSearchInput.value = '';
                document.getElementById('searchClearBtn').style.display = query ? 'block' : 'none';
                doBibleSearch(query, isGlobalSearch);
                if(query.length >= 2) saveSearchHistory(query);
            }, 300));

            yeokdoSearchInput.addEventListener('input', debounce((e) => {
                const query = e.target.value.trim();
                searchInput.value = '';
                document.getElementById('yeokdoClearBtn').style.display = query ? 'block' : 'none';
                doYeokdoSearch(query);
            }, 300));

            document.getElementById('globalSearchBtn').addEventListener('click', toggleGlobalSearch);
            document.getElementById('tocToggleBtn').addEventListener('click', () => {
                const sidebar = document.getElementById('sidebar');
                if (window.innerWidth <= 768) sidebar.classList.toggle('show');
                else sidebar.classList.toggle('collapsed');
            });

            const lastBook = localStorage.getItem('hyunmu_last_read_book');
            if (lastBook && YEOKDO_BOOKS.includes(lastBook)) loadYeokdo(lastBook);
            else if (lastBook && BIBLE_LIST.includes(lastBook)) loadScripture(lastBook);
            else if (BIBLE_LIST.length > 0) loadScripture(BIBLE_LIST[0]);
        }

        function loadYeokdo(displayName) {
            const activeItem = document.querySelector(`.book-item[data-book="${displayName}"]`);
            if (!activeItem) return;

            const wasActive = activeItem.classList.contains('active');
            
            // 모든 book-item에서 active 제거
            document.querySelectorAll('.book-item').forEach(el => el.classList.remove('active'));
            
            if (!wasActive) {
                activeItem.classList.add('active');
                window.currentBookName = displayName;
                // localStorage.setItem('hyunmu_last_read_book', displayName); // 본문 로드 시에만 저장하도록 변경 가능하나 유지

                const tocEl = document.getElementById(`toc-yeokdo-${displayName.replace(/\s+/g, '-')}`);
                if (tocEl) tocEl.innerHTML = renderYeokdoTOC(displayName);

                // 본문은 바꾸지 않고 안내 메시지만 (필요시)
                const reader = document.getElementById('readerContent');
                if (reader.innerHTML === "" || reader.style.display === 'none') {
                    reader.style.display = 'block';
                    reader.innerHTML = `<div class="welcome-message" style="margin-top:20px;">좌측 목차에서 소제목을 선택하면 본문이 표시됩니다.</div>`;
                    document.getElementById('currentTitle').innerHTML = `${displayName} <span style="font-size:12px; color:var(--text-secondary); margin-left:10px;">(易經)</span>`;
                }
            }
        }

        function renderYeokdoTOC(displayName) {
            const internalKey = YEOKDO_MAP[displayName];
            const data = YEOKDO_DATA_ALL[internalKey];
            if (!data) return '';
            
            // 주역 64괘(數 및 한글)는 8x8 수리 행렬 목차
            if (internalKey === '주역_수' || internalKey === '주역_한글') {
                let gridHtml = '<div class="toc-number-grid">';
                const keys = Object.keys(data)
                    .filter(k => parseInt(k) >= 1 && parseInt(k) <= 64)
                    .sort((a, b) => parseInt(a) - parseInt(b));
                keys.forEach(key => {
                    const num = parseInt(key);
                    const title = data[key].title || key;
                    gridHtml += `<div class="toc-number-item" id="grid-item-${internalKey}-${key}" title="${title}" onclick="event.stopPropagation(); loadYeokdoSection('${displayName}', '${key}')">${num}</div>`;
                });
                gridHtml += '</div>';
                return gridHtml;
            }

            // 십익(十翼)은 파일 내 실제 순서대로 7대 정예 목차 출력
            if (internalKey === '십익') {
                const targetPatterns = ['雜 卦 傳', '序 卦 傳', '乾卦 文言傳', '坤卦 文言傳', '說 卦 傳', '系辭上傳', '系辭下傳'];
                let tocHtml = '';
                const keys = Object.keys(data).sort(); // 000_, 001_ 순서 보존
                keys.forEach(key => {
                    const title = data[key].title || '';
                    const normTitle = title.replace(/\s+/g, ' ').trim();
                    const isTarget = targetPatterns.some(p => normTitle.includes(p.replace(/\s+/g, ' ').trim()));
                    
                    if (isTarget) {
                        tocHtml += `<li class="toc-item level-2" id="toc-yeokdo-${internalKey}-${key}" onclick="event.stopPropagation(); loadYeokdoSection('${displayName}', '${key}')">${title}</li>`;
                    }
                });
                return tocHtml;
            }

            let tocHtml = '';
            const keys = Object.keys(data).sort(); 
            keys.forEach(key => {
                const item = data[key];
                const title = item.title || key;
                const level = item.level || 2;
                tocHtml += `<li class="toc-item level-${level}" id="toc-yeokdo-${internalKey}-${key}" onclick="event.stopPropagation(); loadYeokdoSection('${displayName}', '${key}')">${title}</li>`;
            });
            return tocHtml;
        }

        function loadYeokdoSection(displayName, secKey, targetLineIndex = -1) {
            const internalKey = YEOKDO_MAP[displayName];
            
            // 주역_수, 주역_한글, 정역, 십익은 연속 흐름 렌더링 대상
            if (internalKey === '주역_수' || internalKey === '주역_한글' || internalKey === '정역' || internalKey === '십익') {
                const reader = document.getElementById('readerContent');
                if (!reader.dataset.continuousBook || reader.dataset.continuousBook !== internalKey) {
                    renderContinuousYeokdo(internalKey, displayName);
                    reader.dataset.continuousBook = internalKey;
                }
                
                // [Full Stream] 검색 결과 클릭 시 특정 구절 타겟팅, 일반 클릭 시 섹션 제목 타겟팅
                const targetId = (targetLineIndex !== -1) ? `v-${internalKey}-${secKey}-${targetLineIndex}` : `section-${internalKey}-${secKey}`;
                const targetEl = document.getElementById(targetId);

                // [Zero-Dimmed Policy] 모든 강조 제거 및 dimmed 클래스 전면 배제 (잡괘전 수준의 선명도 강제)
                document.querySelectorAll('.hexagram-container, .yeokdo-section-container, .verse-text, .yeokdo-h1, .yeokdo-h2, .yeokdo-h3').forEach(el => {
                    el.classList.remove('focus-active', 'hexagram-focus-title', 'dimmed');
                    el.style.opacity = "1"; 
                });
                
                // 역경 본문 영역 강제 노출
                document.getElementById('readerContent').style.display = 'block';
                document.getElementById('searchResultsArea').style.display = 'none';
                document.getElementById('welcomeScreen').style.display = 'none';

                if (targetEl) {
                    // [Golden Glow Signal] 해당 구절 또는 제목에 마스터의 황금빛 광채 부여
                    targetEl.classList.add('hexagram-focus-title');
                    
                    // [Center-Focus Scroll] 정밀 스크롤 (화면 수직 중앙 정렬)
                    targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });

                    // 사이드바 그리드 또는 리스트 활성 상태 표시
                    if (internalKey === '정역' || internalKey === '십익') {
                        document.querySelectorAll('.toc-container .toc-item').forEach(el => el.style.cssText = '');
                        const activeToc = document.getElementById(`toc-yeokdo-${internalKey}-${secKey}`);
                        if (activeToc) activeToc.style.cssText = 'background:rgba(212,175,55,0.15); color:var(--gold); border-left-color:var(--gold);';
                    } else {
                        document.querySelectorAll('.toc-number-item').forEach(el => el.classList.remove('active'));
                        const gridItem = document.getElementById(`grid-item-${internalKey}-${secKey}`);
                        if (gridItem) gridItem.classList.add('active');
                    }
                }
                
                if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('show');
                return;
            }

            const section = YEOKDO_DATA_ALL[internalKey][secKey];
            if (!section) return;
            const text = section.content;
            window.currentBookText = text;
            document.getElementById('readerContent').dataset.continuousBook = ""; // 연속 모드 해제
            renderYeokdoContent(text, displayName, secKey, targetLineIndex);
            
            document.querySelectorAll(`.toc-container .toc-item`).forEach(el => el.style.cssText = '');
            const activeToc = document.getElementById(`toc-yeokdo-${internalKey}-${secKey}`);
            if (activeToc) activeToc.style.cssText = 'background:rgba(212,175,55,0.15); color:var(--gold); border-left-color:var(--gold);';
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('show');
        }

        function renderContinuousYeokdo(internalKey, displayName) {
            const reader = document.getElementById('readerContent');
            const data = YEOKDO_DATA_ALL[internalKey];
            
            // 주역 괘번호(01~64) 또는 정역의 원본 순서대로 정렬
            const keys = Object.keys(data).sort((a, b) => {
                if (a.includes('_') && b.includes('_')) return a.localeCompare(b);
                return parseInt(a) - parseInt(b);
            });
            
            let fullHtml = ''; 
            
            keys.forEach(key => {
                const item = data[key];
                const text = item.content;
                const lines = text.split('\n');
                const bodyHtml = lines.map((line, i) => {
                    const trimmed = line.trim();
                    let cls = "verse-text";
                    if (trimmed.startsWith('### ')) cls = "yeokdo-h3";
                    else if (trimmed.startsWith('## ')) cls = "yeokdo-h2";
                    else if (trimmed.startsWith('# ')) cls = "yeokdo-h1";
                    
                    const content = (cls !== "verse-text") ? line.replace(/#+/g, '').trim() : (line.replace(/</g,'&lt;').replace(/>/g,'&gt;') || '&nbsp;');
                    const clickAttr = (cls === "verse-text") ? ` onclick="copyToClipboard('v-${internalKey}-${key}-${i}')"` : "";
                    return `<div id="v-${internalKey}-${key}-${i}" class="${cls}" style="white-space:pre-wrap; margin-bottom:0;"${clickAttr}>${content}</div>`;
                }).join('');
                
                const containerClass = (internalKey === '정역' || internalKey === '십익') ? 'yeokdo-section-container' : 'hexagram-container';
                fullHtml += `<div id="section-${internalKey}-${key}" class="${containerClass}">
                    <div style="padding-left:15px;">${bodyHtml}</div>
                </div>`;
            });
            
            reader.innerHTML = fullHtml;
        }

        function renderYeokdoContent(text, displayName, secKey, targetLineIndex = -1) {
            const reader = document.getElementById('readerContent');
            const lines = text.split('\n');
            const bodyHtml = lines.map((line, i) => {
                const tCls = (i === targetLineIndex) ? ' target-highlight' : '';
                const trimmed = line.trim();
                
                if (trimmed.startsWith('### ')) {
                    return `<div id="yeokdo-line-${i}" class="yeokdo-h3${tCls}" style="white-space:pre-wrap; margin-bottom:0;">${line.replace('###', '').trim()}</div>`;
                } else if (trimmed.startsWith('## ')) {
                    return `<div id="yeokdo-line-${i}" class="yeokdo-h2${tCls}" style="white-space:pre-wrap; margin-bottom:0;">${line.replace('##', '').trim()}</div>`;
                } else if (trimmed.startsWith('# ')) {
                    return `<div id="yeokdo-line-${i}" class="yeokdo-h1${tCls}" style="white-space:pre-wrap; margin-bottom:0;">${line.replace('#', '').trim()}</div>`;
                }
                
                return `<div id="yeokdo-line-${i}" class="verse-text${tCls}" style="white-space:pre-wrap; margin-bottom:0;" onclick="copyToClipboard('yeokdo-line-${i}')">${line.replace(/</g,'&lt;').replace(/>/g,'&gt;') || '&nbsp;'}</div>`;
            }).join('');
            
            // secKey에서 정렬용 인덱스 제거하여 표시
            const displaySecKey = secKey.replace(/^\d+_/, '');
            reader.innerHTML = `<h2 class="chapter-header" style="margin-top:0;">${displayName} &gt; ${displaySecKey}</h2><div style="border-left:2px solid var(--glass-border); padding-left:15px; white-space:pre-wrap;">${bodyHtml}</div>`;
            if (targetLineIndex !== -1) document.getElementById(`yeokdo-line-${targetLineIndex}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
            else document.getElementById('contentArea').scrollTop = 0;
        }

        function doYeokdoSearch(queryStr) {
            const query = queryStr.toLowerCase().replace(/\s+/g, '');
            const searchArea = document.getElementById('searchResultsArea');
            if (!query) return;
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('readerContent').style.display = 'none';
            searchArea.style.display = 'block';
            let resultsHtml = '', totalMatches = 0;
            YEOKDO_BOOKS.forEach(displayName => {
                const internalKey = YEOKDO_MAP[displayName];
                const catData = YEOKDO_DATA_ALL[internalKey];
                let matchesInBook = 0, bookHtml = '';
                Object.keys(catData).forEach(secKey => {
                    const text = catData[secKey].content;
                    const lines = text.split('\n');
                    lines.forEach((line, i) => {
                        if (line.toLowerCase().replace(/\s+/g, '').includes(query) || getChoseong(line).includes(query)) {
                            bookHtml += `<div class="search-result-item" onclick="loadScripture('${displayName}', ${i}, '${secKey}')" style="cursor:pointer; margin-bottom:15px; padding:10px; border-radius:8px;">
                                <h3 class="verse-header" style="margin-top:0;"><span style="color:#9aa0a6;">${displayName} &gt; </span>${secKey}</h3>
                                <p class="verse-text match" style="border-left:3px solid var(--gold); margin-bottom:0;">${line.replace(/^#+\s+/,'')}</p>
                            </div>`;
                            matchesInBook++; totalMatches++;
                        }
                    });
                });
                if (matchesInBook > 0) resultsHtml += `<div class="search-result-book">${displayName} (${matchesInBook}건)</div>` + bookHtml;
            });
            searchArea.innerHTML = resultsHtml || `<p class="verse-text" style="text-align:center; margin-top:50px;">검색 결과가 없습니다.</p>`;
            document.getElementById('currentTitle').innerHTML = `역경 검색 <span style="font-size:12px; color:var(--text-secondary); margin-left:10px;">(총 ${totalMatches}건)</span>`;
        }

        function loadScripture(bookName, targetLineIndex = -1, secKey = null) {
            // [Full Stream Integration] 역경(주역, 정역, 십익) 카테고리 체크
            if (YEOKDO_BOOKS.includes(bookName)) {
                loadYeokdoSection(bookName, secKey || "01", targetLineIndex);
                return;
            }

            const activeItem = document.querySelector(`.book-item[data-book="${bookName}"]`);
            if (!activeItem) return;
            
            const wasActive = activeItem.classList.contains('active');
            
            // 모든 book-item에서 active 제거
            document.querySelectorAll('.book-item').forEach(el => el.classList.remove('active'));
            
            if (targetLineIndex !== -1) {
                // 검색 결과 클릭 시 즉시 본문 로드
                activeItem.classList.add('active');
                renderScriptureContent(bookName, targetLineIndex);
            } else if (!wasActive) {
                // 제목 클릭 시 토글만 수행
                activeItem.classList.add('active');
                const text = BIBLE_DATA[bookName];
                const cleanedText = cleanMarkdown(text || "");
                const tocContainer = document.getElementById(`toc-${bookName.replace(/\s+/g, '-')}`);
                if (tocContainer && !tocContainer.hasChildNodes()) tocContainer.innerHTML = buildTOC(cleanedText, bookName);
            }
        }

        function renderScriptureContent(bookName, targetLineIndex = -1) {
            const text = BIBLE_DATA[bookName];
            if (!text) return;
            const cleanedText = cleanMarkdown(text);
            renderContent(cleanedText, bookName, targetLineIndex);
            window.currentBookName = bookName;
            localStorage.setItem('hyunmu_last_read_book', bookName);
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('show');
        }

        function loadScriptureSection(bookName, elementId) {
            if (window.currentBookName !== bookName) {
                renderScriptureContent(bookName);
            }
            scrollToId(elementId);
        }

        function renderContent(text, title, targetLineIndex = -1) {
            document.getElementById('currentTitle').innerHTML = `${title} <span style="font-size:12px; color:var(--text-secondary); margin-left:10px;">(Bible)</span>`;
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('searchResultsArea').style.display = 'none';
            const reader = document.getElementById('readerContent');
            reader.style.display = 'block';
            
            // [정상화] 제목 포함 여부로 특수 경전 판별 (인식률 향상)
            const isSpecial = (title.includes('동곡비서') || title.includes('보천교 교전'));
            
            // [동기화] 특수 구분자 전처리 (줄바꿈 강제 삽입으로 인식 분리)
            let processedText = text;
            if (isSpecial) processedText = text.replace(/<(\d+)>/g, '\n<$1>');
            
            const lines = processedText.split('\n');
            let html = '', cIdx = 0, vIdx = 0;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const lid = `bible-line-${i}`;
                const tCls = (i === targetLineIndex) ? ' target-highlight' : '';
                
                // [수수함] <숫자> 패턴을 거창한 제목(h2)이 아닌 본문의 자연스러운 시작점으로 처리
                if (isSpecial && /^<(\d+)>/.test(line)) {
                    const m = line.match(/^<(\d+)>(.*)/);
                    const num = m[1];
                    const content = m[2].trim();
                    // 과도한 테두리와 장식을 제거하고 수수한 텍스트 양식으로 변환
                    html += `<p id="toc-dong-${num}" class="verse-text${tCls}" style="white-space: pre-wrap; scroll-margin-top:160px;" onclick="copyToClipboard('toc-dong-${num}')"><span style="color:#D4AF37; font-weight:bold; margin-right:10px;">[${num}]</span> ${content}</p>`;
                } else if (line.startsWith('### ')) {
                    html += `<h3 id="toc-3-${cIdx}-${vIdx++}" class="verse-header${tCls}">${line.replace('###', '').trim()}</h3>`;
                } else if (line.startsWith('## ')) {
                    vIdx = 0; 
                    html += `<h2 id="toc-2-${++cIdx}" class="chapter-header${tCls}">${line.replace('##', '').trim()}</h2>`;
                } else if (line.startsWith('# ')) {
                    html += `<h1 class="yeokdo-h1${tCls}">${line.replace('#', '').trim()}</h1>`;
                } else {
                    // [무결성] 일반 텍스트 누락 없이 paragraphs로 렌더링
                    html += `<p id="${lid}" class="verse-text${tCls}" style="white-space: pre-wrap;" onclick="copyToClipboard('${lid}')">${line}</p>`;
                }
            }
            
            // [최종 보루] 파싱 결과가 비어있을 경우 원본이라도 현시하여 백지화 방지
            reader.innerHTML = html || `<div class="verse-text">${text}</div>`;
            
            if (targetLineIndex !== -1) {
                const targetEl = document.getElementById(`bible-line-${targetLineIndex}`);
                if (targetEl) targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                document.getElementById('contentArea').scrollTop = 0;
            }
        }

        function buildTOC(text, bookName) {
            const lines = text.split('\n');
            let tocHtml = '', cIdx = 0, vIdx = 0;
            const isSpecial = (bookName.includes('동곡비서') || bookName.includes('보천교 교전'));
            
            // [절제] 특수 경전은 복잡한 구절 목차를 폐기하고 단일 항목으로 통일
            if (isSpecial) {
                tocHtml += `<div class="toc-item level-2" style="color:var(--gold); font-weight:800; border-left:2px solid var(--gold);" onclick="event.stopPropagation(); renderScriptureContent('${bookName}')">[ 전체 본문 보기 ]</div>`;
                return tocHtml; // 하위 목차 생성을 중단하여 UI를 정갈하게 유지
            }

            lines.forEach(line => {
                const trimmed = line.trim();
                if (trimmed.startsWith('### ')) {
                    tocHtml += `<div class="toc-item level-3" onclick="event.stopPropagation(); loadScriptureSection('${bookName}', 'toc-3-${cIdx}-${vIdx++}')">${trimmed.replace('###','').trim()}</div>`;
                } else if (trimmed.startsWith('## ')) {
                    vIdx = 0; tocHtml += `<div class="toc-item level-2" onclick="event.stopPropagation(); loadScriptureSection('${bookName}', 'toc-2-${++cIdx}')">${trimmed.replace('##','').trim()}</div>`;
                } 
                // [동기화] 특수 경전 <숫자> 패턴 목차 추출
                else if (isSpecial && /<(\d+)>/.test(trimmed)) {
                    const m = trimmed.match(/<(\d+)>(.*)/);
                    const num = m[1];
                    let summary = m[2].trim();
                    if (summary.length > 20) summary = summary.substring(0, 20) + '...';
                    // 본문 ID(toc-dong-)와 정확히 일치시켜 스크롤 연결
                    tocHtml += `<div class="toc-item level-2" onclick="event.stopPropagation(); loadScriptureSection('${bookName}', 'toc-dong-${num}')"><${num}> ${summary}</div>`;
                }
            });
            return tocHtml;
        }

        function scrollToId(id) {
            const el = document.getElementById(id);
            if (el) document.getElementById('contentArea').scrollTo({ top: el.offsetTop - 110, behavior: 'smooth' });
        }

        function toggleGlobalSearch() {
            isGlobalSearch = !isGlobalSearch;
            const btn = document.getElementById('globalSearchBtn');
            btn.classList.toggle('active', isGlobalSearch);
            btn.textContent = isGlobalSearch ? '전체 검색 모드 해제' : '전체 경전 검색';
            if (isGlobalSearch) document.getElementById('searchInput').focus();
        }

        function doBibleSearch(queryStr, isGlobal) {
            const query = queryStr.toLowerCase().replace(/\s+/g, '');
            const searchArea = document.getElementById('searchResultsArea');
            if (!query) return;
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('readerContent').style.display = 'none';
            searchArea.style.display = 'block';
            let resultsHtml = '', totalMatches = 0;
            const targetBooks = isGlobal ? BIBLE_LIST : (window.currentBookName ? [window.currentBookName] : BIBLE_LIST);
            targetBooks.forEach(book => {
                const lines = cleanMarkdown(BIBLE_DATA[book] || "").split('\n');
                let matches = 0, bHtml = '';
                lines.forEach((line, i) => {
                    if (line.toLowerCase().replace(/\s+/g,'').includes(query) || getChoseong(line).includes(query)) {
                        bHtml += `<div class="search-result-item" onclick="loadScripture('${book}', ${i})" style="cursor:pointer; margin-bottom:15px; padding:10px; border-radius:8px;">
                            <h3 class="verse-header" style="margin-top:0;"><span style="color:#9aa0a6;">${book}</span></h3>
                            <p class="verse-text match" style="border-left:3px solid var(--gold); margin-bottom:0;">${line.replace(/^#+\s+/,'')}</p>
                        </div>`;
                        matches++; totalMatches++;
                    }
                });
                if (matches > 0) resultsHtml += `<div class="search-result-book">${book} (${matches}건)</div>` + bHtml;
            });
            searchArea.innerHTML = resultsHtml || `<p class="verse-text" style="text-align:center; margin-top:50px;">결과가 없습니다.</p>`;
            document.getElementById('currentTitle').innerHTML = `성구 검색 <span style="font-size:12px; color:var(--text-secondary); margin-left:10px;">(총 ${totalMatches}건)</span>`;
        }
    </script>
</body>
