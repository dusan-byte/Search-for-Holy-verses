<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성구(原典) 검색 ver 1.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --bg-accent: #16161a;
            --gold: #d4af37;
            --gold-hover: #ebd076;
            --gold-dim: rgba(212, 175, 55, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --text-primary: #e8e8e8;
            --text-secondary: #9aa0a6;
            --font-main: 'Noto Serif KR', serif;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: var(--font-main);
            background-color: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            background: radial-gradient(circle at 50% 50%, var(--gold-dim) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .app-container {
            display: flex;
            height: 100vh;
            padding: 24px;
            box-sizing: border-box;
            gap: 24px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
        }

        #sidebar {
            width: 340px;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
        }

        #sidebar.collapsed {
            width: 0;
            padding: 0;
            border: none;
            margin-left: -24px;
            opacity: 0;
            pointer-events: none;
        }

        .sidebar-header {
            padding: 30px 24px 15px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .sidebar-header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
        }

        .sidebar-header .subtitle {
            margin: 5px 0 0;
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        .search-container {
            padding: 15px 24px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .global-search-btn {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--gold);
            color: var(--gold);
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .global-search-btn.active,
        .global-search-btn:hover {
            background: var(--gold);
            color: var(--bg-dark);
            box-shadow: 0 0 10px var(--gold-dim);
        }

        /* 성구(原典) 검색 ver 1.0 테마 */
        :root { 
            --gold: #B8952E; 
            --gold-hover: #ebd076;
            --gold-dim: rgba(184, 149, 46, 0.15);
            --bg-dark: #121212; 
        }

        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--glass-border);
        }

        #searchInput {
            width: 100% !important;
            box-sizing: border-box !important;
            padding: 12px 40px 12px 15px; /* X 버튼 공간 확보 */
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px var(--gold-dim);
        }

        .clear-search-btn {
            position: absolute;
            right: 20px;
            cursor: pointer;
            color: #888;
            display: none;
            font-size: 18px;
            z-index: 10;
        }

        .clear-search-btn:hover {
            color: var(--gold);
        }

        /* [핵심] 황금빛 광채 하이라이트 */
        .highlight-target {
            background: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            border-radius: 4px;
            padding: 2px 5px;
            font-weight: bold;
            display: inline-block;
            transition: all 0.5s ease;
        }

        /* [핵심] 📋 복사 아이콘 */
        .copy-btn-inline {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 8px;
            cursor: pointer;
            color: var(--gold);
            font-size: 0.8em;
            padding: 2px 5px;
            border: 1px solid rgba(184, 149, 46, 0.3);
            border-radius: 4px;
            background: rgba(184, 149, 46, 0.05);
            transition: all 0.2s;
        }

        .copy-btn-inline:hover {
            background: var(--gold);
            color: #1a1a1a;
        }

        /* 복사 성공 토스트 알림 */
        .copy-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(184, 149, 46, 0.95);
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: fadeUp 1.5s ease-out forwards;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translate(-50%, 10px);
            }

            20% {
                opacity: 1;
                transform: translate(-50%, 0);
            }

            80% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -10px);
            }
        }

        .book-list-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(212, 175, 55, 0.4);
        }

        .book-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .book-item {
            cursor: pointer;
            font-size: 15px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            display: flex;
            flex-direction: column;
        }

        .book-item-title {
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .arrow-icon {
            font-size: 10px;
            transition: transform 0.3s ease;
            opacity: 0.5;
        }

        .book-item.active .arrow-icon {
            transform: rotate(90deg);
            opacity: 1;
            color: var(--gold);
        }

        .book-item:hover .book-item-title {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .book-item.active {
            color: var(--gold);
            border-left-color: var(--gold);
        }

        .book-item.active .book-item-title {
            background: var(--gold-dim);
            font-weight: 600;
            color: var(--gold);
        }

        .toc-container {
            display: none;
            flex-direction: column;
            padding: 10px 24px 15px 34px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .book-item.active .toc-container {
            display: flex;
        }

        .toc-item {
            font-size: 13px;
            color: var(--text-secondary);
            padding: 6px 12px;
            margin-bottom: 2px;
            border-radius: 6px;
            transition: all 0.2s ease;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
            border-left: 1px solid var(--glass-border);
        }

        .toc-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            border-left-color: var(--gold);
        }

        .toc-item.level-2 {
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 8px;
            border-left-color: rgba(212, 175, 55, 0.5);
        }

        .toc-item.level-3 {
            padding-left: 20px;
        }

        .main-view {
            flex-grow: 1;
            overflow: hidden;
            position: relative;
        }

        .main-header {
            padding: 30px 40px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .main-header h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            color: var(--gold);
        }

        .content-area {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            scroll-behavior: smooth;
            height: calc(100% - 90px);
            box-sizing: border-box;
        }

        .welcome-message {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 100px;
            font-size: 18px;
            line-height: 1.8;
        }

        .welcome-message strong {
            color: var(--gold);
        }

        .chapter-header {
            font-size: 22px;
            color: var(--text-primary);
            margin: 40px 0 20px;
            font-weight: 600;
            border-bottom: 1px dashed var(--glass-border);
            padding-bottom: 10px;
        }

        .verse-header {
            font-size: 16px;
            color: var(--gold);
            margin: 30px 0 10px;
            font-weight: 600;
        }

        .verse-text {
            font-size: 17px;
            line-height: 1.9;
            color: var(--text-secondary);
            margin-bottom: 15px;
            padding-left: 15px;
            border-left: 2px solid var(--glass-border);
        }

        .highlight {
            background-color: var(--gold-dim);
            color: var(--gold-hover);
            padding: 2px 4px;
            border-radius: 4px;
        }

        .floating-toggle-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--bg-accent);
            border: 1px solid var(--glass-border);
            color: var(--gold);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: var(--glass-shadow);
            transition: all 0.3s ease;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .floating-toggle-btn:hover {
            background: var(--gold-dim);
            border-color: var(--gold);
            transform: translateY(-3px);
        }

        .search-result-book {
            font-size: 18px;
            color: var(--gold);
            margin: 40px 0 15px;
            font-weight: 700;
            border-bottom: 1px solid var(--gold-dim);
            padding-bottom: 8px;
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 0;
                gap: 0;
            }

            #sidebar {
                position: fixed;
                left: -300px;
                top: 0;
                bottom: 0;
                width: 300px;
                z-index: 1000;
                border-radius: 0;
                transition: left 0.3s ease;
            }

            #sidebar.show {
                left: 0;
            }

            .main-view {
                border-radius: 0;
                height: 100vh;
                width: 100vw;
            }

            .main-header {
                padding: 15px 20px;
            }

            .main-header h2 {
                font-size: 20px;
            }

            .content-area {
                padding: 20px;
                height: calc(100% - 60px);
            }

            .sidebar-header {
                padding: 40px 20px 20px;
            }

            .sidebar-header h1 {
                font-size: 22px;
            }

            .book-item-title {
                padding: 16px 24px;
                font-size: 16px;
            }

            .toc-item {
                padding: 12px 16px;
                font-size: 14px;
                margin-bottom: 4px;
            }

            .floating-toggle-btn {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
            }

            .welcome-message {
                margin-top: 60px;
                font-size: 16px;
            }

            .verse-text {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <aside id="sidebar" class="glass-panel">
            <div class="sidebar-header">
                <h1>성구(原典) 검색 ver 1.0</h1>
                <p class="subtitle">항상 깨어 있으라</p>
            </div>
            <div class="search-container">
                <button id="globalSearchBtn" class="global-search-btn" onclick="performAllSearch()">전체 경전 검색</button>
                <div style="position: relative; width: 100%;">
                    <input type="text" id="searchInput" placeholder="전체 경전 검색..." oninput="handleSearchInput()">
                    <span id="clearSearchBtn" class="clear-search-btn" onclick="resetSearch()">×</span>
                </div>
            </div>
            <div class="book-list-container">
                <ul id="bookList" class="book-list"></ul>
            </div>
        </aside>
        <main id="mainView" class="glass-panel main-view">
            <header class="main-header">
                <h2 id="currentTitle">데이터 로드 중...</h2>
            </header>
            <div id="contentArea" class="content-area">
                <div class="welcome-message">
                    데이터를 준비 중입니다. 잠시만 기다려주세요.<br>
                </div>
            </div>
            <button id="tocToggleBtn" class="floating-toggle-btn" title="목차 열기/닫기">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </main>
    </div>
    <script src="data.js" charset="utf-8"></script>
    <script src="data_md.js" charset="utf-8"></script>
    <script>
        console.log("🚀 성구 데이터를 로컬 자바스크립트로 초기화합니다...");
        let BIBLE_DATA = {};
        let BIBLE_LIST = [];
        let YEOKDO_DATA = {};
        let YEOKDO_LIST = [];
        let isGlobalSearch = false;

        document.addEventListener("DOMContentLoaded", () => {
            if (typeof window.BIBLE_DATA_RAW !== 'undefined') {
                BIBLE_DATA = window.BIBLE_DATA_RAW;
                BIBLE_LIST = Object.keys(BIBLE_DATA).sort();
                
                if (typeof window.yeokdoData !== 'undefined') {
                    YEOKDO_DATA = window.yeokdoData;
                    YEOKDO_LIST = Object.keys(YEOKDO_DATA);
                }
                
                console.log(`✅ 데이터 로드 완료: ${BIBLE_LIST.length}권의 경전 / ${YEOKDO_LIST.length}권의 역도 자료`);
                initApp();
            } else {
                console.error("데이터 초기화 실패: data.js 파일을 찾을 수 없습니다.");
                document.getElementById('currentTitle').innerHTML = "데이터 로딩 오류!";
                document.getElementById('contentArea').innerHTML = "<p>data.js 파일을 제대로 불러오지 못했습니다. 같은 폴더에 파일이 있는지 확인해주세요.</p>";
            }
        });

        const CHOSEONG = ["ㄱ", "ㄲ", "ㄴ", "ㄷ", "ㄸ", "ㄹ", "ㅁ", "ㅂ", "ㅃ", "ㅅ", "ㅆ", "ㅇ", "ㅈ", "ㅉ", "ㅊ", "ㅋ", "ㅌ", "ㅍ", "ㅎ"];

        function getChoseong(text) {
            let result = "";
            for (let i = 0; i < text.length; i++) {
                let code = text.charCodeAt(i) - 44032;
                if (code > -1 && code < 11172) {
                    result += CHOSEONG[Math.floor(code / 588)];
                } else {
                    result += text.charAt(i).toLowerCase();
                }
            }
            return result;
        }

        function cleanMarkdown(mdText) {
            let text = mdText.replace(/!\[.*?\]\(.*?\)/g, '');
            text = text.replace(/<\/?[^>]+(>|$)/g, "");
            return text;
        }

        function initApp() {
            const bookListEl = document.getElementById('bookList');

            BIBLE_LIST.forEach(book => {
                const li = document.createElement('li');
                li.className = 'book-item';
                li.dataset.book = book;

                const titleDiv = document.createElement('div');
                titleDiv.className = 'book-item-title';
                titleDiv.innerHTML = `<span>${book}</span><span class="arrow-icon">▶</span>`;
                titleDiv.onclick = (e) => {
                    loadScripture(book);
                };
                li.appendChild(titleDiv);

                const tocDiv = document.createElement('div');
                tocDiv.className = 'toc-container';
                tocDiv.id = `toc-${book.replace(/\s+/g, '-')}`;
                li.appendChild(tocDiv);

                bookListEl.appendChild(li);
            });

            document.getElementById('searchInput').addEventListener('input', handleSearch);
            document.getElementById('globalSearchBtn').addEventListener('click', toggleGlobalSearch);
            document.getElementById('tocToggleBtn').addEventListener('click', () => {
                const sidebar = document.getElementById('sidebar');
                if (window.innerWidth <= 768) {
                    sidebar.classList.toggle('show');
                } else {
                    sidebar.classList.toggle('collapsed');
                }
            });

            if (BIBLE_LIST.length > 0) {
                const defaultBook = BIBLE_LIST.find(b => b.includes('전지언')) || BIBLE_LIST[0];
                loadScripture(defaultBook);
            }
        }

        function buildTOC(text) {
            const lines = text.split('\n');
            let tocHtml = '';
            let chapterIndex = 0;
            let verseIndex = 0;

            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('### ')) {
                    const title = line.replace('###', '').trim();
                    const id = `toc-3-${chapterIndex}-${verseIndex++}`;
                    tocHtml += `<div class="toc-item level-3" onclick="scrollToId('${id}')">${title}</div>`;
                } else if (line.startsWith('## ')) {
                    const title = line.replace('##', '').trim();
                    verseIndex = 0;
                    const id = `toc-2-${++chapterIndex}`;
                    tocHtml += `<div class="toc-item level-2" onclick="scrollToId('${id}')">${title}</div>`;
                }
            }
            return tocHtml;
        }

        function scrollToId(id) {
            const el = document.getElementById(id);
            if (el) {
                const container = document.getElementById('contentArea');
                container.scrollTo({
                    top: el.offsetTop - container.offsetTop - 20,
                    behavior: 'smooth'
                });

                if (window.innerWidth <= 768) {
                    document.getElementById('sidebar').classList.remove('show');
                }
            }
        }

        function toggleGlobalSearch() {
            isGlobalSearch = !isGlobalSearch;
            const btn = document.getElementById('globalSearchBtn');
            const searchInput = document.getElementById('searchInput');
            const contentArea = document.getElementById('contentArea');

            if (isGlobalSearch) {
                btn.classList.add('active');
                btn.textContent = '통합 검색 모드 (해제하려면 클릭)';
                searchInput.placeholder = "전체 경전에서 검색...";

                document.querySelectorAll('.book-item').forEach(el => el.classList.remove('active'));

                document.getElementById('currentTitle').innerHTML = `통합 검색 <span style="font-size:12px; color:var(--text-secondary); margin-left:10px;">(성구+역도 전체 대상)</span>`;
                contentArea.innerHTML = '<div class="welcome-message">검색어를 입력하시면 전체 경전에서 결과를 찾아드립니다.</div>';
                searchInput.focus();
            } else {
                btn.classList.remove('active');
                btn.textContent = '전체 경전 검색';
                searchInput.placeholder = "현재 경전 내 검색...";

                const lastBook = window.currentBookName || BIBLE_LIST[0];
                if (lastBook) loadScripture(lastBook);
            }
        }

        function loadScripture(bookName) {
            const prevActive = document.querySelector('.book-item.active');
            const isSameBook = prevActive && prevActive.dataset.book === bookName;

            if (isGlobalSearch) {
                toggleGlobalSearch();
            }

            if (isSameBook) {
                // 이미 열려있는 도서를 클릭한 경우 닫기 (토글)
                prevActive.classList.toggle('active');
                return;
            }

            // 새로운 도서를 클릭하거나 닫혀있던 도서를 열 때
            const text = BIBLE_DATA[bookName];
            if (!text) return;

            const cleanedText = cleanMarkdown(text);
            renderContent(cleanedText, bookName);

            document.querySelectorAll('.book-item').forEach(el => {
                el.classList.remove('active');
                if (el.dataset.book === bookName) {
                    el.classList.add('active');
                }
            });

            window.currentBookText = cleanedText;
            window.currentBookName = bookName;

            const tocContainerId = `toc-${bookName.replace(/\s+/g, '-')}`;
            const tocContainer = document.getElementById(tocContainerId);
            if (tocContainer && !tocContainer.hasChildNodes()) {
                tocContainer.innerHTML = buildTOC(cleanedText);
            }

            const activeEl = document.querySelector('.book-item.active');
            if (activeEl) {
                activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            if (window.innerWidth <= 768 && !isSameBook) {
                document.getElementById('sidebar').classList.remove('show');
            }
        }

        function renderContent(text, title) {
            document.getElementById('currentTitle').innerHTML = `${title} <span style="font-size:12px; color:var(--text-secondary); margin-left:10px;">(로컬 데이터 모드)</span>`;

            const lines = text.split('\n');
            let htmlContent = '';

            let chapterIndex = 0;
            let verseIndex = 0;

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                if (line.startsWith('### ')) {
                    const cleanTitle = line.replace('###', '').trim();
                    const id = `toc-3-${chapterIndex}-${verseIndex++}`;
                    htmlContent += `<h3 id="${id}" class="verse-header">${cleanTitle}</h3>`;
                } else if (line.startsWith('## ')) {
                    const cleanTitle = line.replace('##', '').trim();
                    verseIndex = 0;
                    const id = `toc-2-${++chapterIndex}`;
                    htmlContent += `<h2 id="${id}" class="chapter-header">${cleanTitle}</h2>`;
                } else if (line.startsWith('# ')) {
                } else {
                    htmlContent += `<p class="verse-text">${line}</p>`;
                }
            }

            document.getElementById('contentArea').innerHTML = htmlContent;
            document.getElementById('contentArea').scrollTop = 0;
        }

        function performSearchOnText(text, query, bookName = '') {
            const lines = text.split('\n');
            let html = '';
            let count = 0;
            let currentChapter = '';
            let currentVerse = '';

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                if (line.startsWith('## ')) currentChapter = line.replace('##', '').trim();
                else if (line.startsWith('### ')) currentVerse = line.replace('###', '').trim();
                else if (!line.startsWith('#')) {
                    const rawLineForSearch = line.replace(/\s+/g, '').toLowerCase();
                    const choseongLine = getChoseong(rawLineForSearch);

                    if (rawLineForSearch.includes(query) || choseongLine.includes(query)) {
                        const bookPrefix = bookName ? `<span style="color:#9aa0a6;">${bookName} &gt; </span>` : '';
                        html += `
                            <h3 class="verse-header">${bookPrefix}${currentChapter} &gt; ${currentVerse}</h3>
                            <p class="verse-text match" style="border-left: 3px solid var(--gold);">${line}</p>
                        `;
                        count++;
                    }
                }
            }
            return { html, count };
        }

        // [UI] 검색창 제어
        function handleSearchInput() {
            const input = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearSearchBtn');
            const query = input.value.trim();
            clearBtn.style.display = query ? 'block' : 'none';
            
            if (isGlobalSearch) return; // 전체 검색 모드일 때는 엔터나 버튼 클릭으로 유도 (성능 보호)
            
            if (!query) {
                const activeBook = document.querySelector('.book-item.active');
                if (activeBook && window.currentBookText) {
                    renderContent(window.currentBookText, window.currentBookName);
                }
                return;
            }
            
            // 로컬 검색 (실시간)
            if (window.currentBookText) {
                const results = [];
                const lines = window.currentBookText.split('\n');
                lines.forEach(line => {
                    if (line.includes(query)) results.push({ book: window.currentBookName, text: line.trim() });
                });
                displayResults(results, false);
            }
        }

        function resetSearch() {
            const input = document.getElementById('searchInput');
            input.value = '';
            handleSearchInput();
            if (isGlobalSearch) {
                document.getElementById('contentArea').innerHTML = '<div class="welcome-message">검색어를 입력하시면 전체 경전에서 결과를 찾아드립니다.</div>';
            }
        }

        // [최종] 전체 경전을 탐색하여 결과를 내놓는 함수
        function performAllSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                alert("검색어를 입력해 주세요.");
                return;
            }

            const results = [];
            const sourceData = BIBLE_DATA || {};
            const yeokdoData = YEOKDO_DATA || {};

            // 1. 성구 검색
            for (let book in sourceData) {
                const lines = sourceData[book].split('\n');
                lines.forEach(line => { 
                    if (line.includes(query)) results.push({ book: book, text: line.trim() }); 
                });
            }
            // 2. 역경 검색
            for (let book in yeokdoData) {
                const lines = yeokdoData[book].split('\n');
                lines.forEach(line => { 
                    if (line.includes(query)) results.push({ book: book, text: line.trim() }); 
                });
            }

            displayResults(results, true);
        }

        function displayResults(results, isAllSearch = false) {
            const container = document.getElementById('contentArea');
            container.innerHTML = results.length ? '' : '<div style="padding:40px; color:#666; text-align:center;">' + (isAllSearch ? '전체 경전에서 ' : '현재 경전에서 ') + '검색 결과가 없습니다.</div>';
            
            const titlePrefix = isAllSearch ? '통합 검색' : '현재 경전 검색';
            document.getElementById('currentTitle').innerHTML = `${titlePrefix} 결과 <span style="font-size:12px; color:var(--text-secondary); margin-left:10px;">(총 ${results.length}건)</span>`;

            results.forEach(res => {
                const div = document.createElement('div');
                div.style.padding = '15px 0';
                div.style.borderBottom = '1px solid var(--glass-border)';
                div.style.cursor = 'pointer';
                div.style.transition = 'all 0.2s';
                
                div.onmouseover = () => div.style.backgroundColor = 'rgba(255,215,0,0.03)';
                div.onmouseout = () => div.style.backgroundColor = 'transparent';
                
                div.onclick = () => showContext(res.book, res.text);
                
                div.innerHTML = `
                    <div style="font-size:11px; color:var(--gold); margin-bottom:4px;">[${res.book}]</div>
                    <div class="verse-text" style="font-size:14px; line-height:1.5; color: var(--text-primary); border-left: 2px solid var(--gold); padding-left:10px; margin:0;">${res.text}</div>
                `;
                container.appendChild(div);
            });
            container.scrollTop = 0;
        }

        // [부활] 📋 복사 아이콘 및 황금빛 하이라이트가 포함된 맥락 보기
        function showContext(bookName, targetText) {
            const fullText = BIBLE_DATA[bookName] || YEOKDO_DATA[bookName];
            if (!fullText) return;
            
            const copyIconHtml = `<span class="copy-btn-inline" onclick="event.stopPropagation(); copyVerse('${targetText.replace(/'/g, "\\'")}')">📋 복사</span>`;
            
            const highlightedBody = fullText.replace(
                targetText, 
                `<span id="focus-verse" class="highlight-target">${targetText}${copyIconHtml}</span>`
            );

            document.getElementById('currentTitle').innerText = bookName;
            document.getElementById('contentArea').innerHTML = `
                <div style="white-space: pre-wrap; font-family: 'Noto Serif KR', serif; line-height:1.9; font-size:16px; padding:20px 0; color: var(--text-primary);">
                    ${highlightedBody}
                </div>
            `;

            setTimeout(() => {
                const el = document.getElementById('focus-verse');
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        // [이식] 원터치 복사 및 토스트 알림
        function copyVerse(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.createElement('div');
                toast.className = 'copy-toast';
                toast.innerText = '📜 구절이 클립보드에 복사되었습니다.';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 1500);
            });
        }
    </script>
</body>
