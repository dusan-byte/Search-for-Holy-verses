<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <!-- 캐시 방지 (무조건 새로고침) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성구(原典) 검색 ver 1.0</title>
    <!-- [미학적 고도화] 고전 서체 라이브러리 임포트 -->
    <link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=Noto+Serif+KR:wght@400;700;900&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <script>
        // [무조건 반사] 모바일 강제 리다이렉트 (768px 미만 또는 Mobile UA)
        if (window.innerWidth < 768 || /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            if (!window.location.search.includes('mode=pc')) {
                window.location.replace("mobile.html");
            }
        }
    </script>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --bg-accent: #16161a;
            --gold: #d4af37;
            --gold-hover: #ebd076;
            --gold-dim: rgba(212, 175, 55, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --text-primary: #e8e8e8;
            --text-secondary: #9aa0a6;
            --gold-premium: #f3d47a;
            --font-title: 'Song Myung', serif;
            --font-main: 'Noto Serif KR', serif;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: var(--font-main);
            background-color: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            background: radial-gradient(circle at 50% 50%, var(--gold-dim) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .app-container {
            display: flex;
            height: 100vh;
            padding: 24px;
            box-sizing: border-box;
            gap: 24px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
        }

        #sidebar {
            width: 340px;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
        }

        #sidebar.collapsed {
            width: 0;
            padding: 0;
            border: none;
            margin-left: -24px;
            opacity: 0;
            pointer-events: none;
        }

        .sidebar-header {
            padding: 30px 24px 15px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .sidebar-header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
            font-family: var(--font-title);
        }

        .brand-name {
            font-size: 20px;
            color: var(--gold);
            font-weight: 800;
            letter-spacing: 1px;
            margin-top: 8px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            font-family: 'Outfit', sans-serif;
        }

        .sidebar-section-title {
            padding: 16px 24px 0.8rem;
            font-size: 1.25rem; /* [위계 정립] 대제목 크기 상향 */
            color: #ffd700;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-top: 1px solid var(--glass-border);
            margin-top: 20px;
            opacity: 1;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
            font-family: var(--font-title);
        }

        #readerContent {
            white-space: pre-wrap;
            line-height: 1.75;
            font-family: var(--font-main);
            color: #eee;
            font-size: 1.15rem;
            letter-spacing: -0.01em;
        }

        .search-container {
            padding: 20px 24px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .global-search-btn {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: none;
            color: var(--gold);
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .global-search-btn.active,
        .global-search-btn:hover {
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
            box-shadow: 0 0 15px var(--gold-dim);
        }

        .search-input-wrapper {
            position: relative;
            width: 100%;
        }

        .search-input-wrapper input {
            width: 100%;
            padding: 14px 35px 14px 16px; 
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.2);
            border: none;
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input-wrapper input:focus {
            box-shadow: 0 0 12px var(--gold-dim);
        }

        #yeokdoSearchInput {
            width: 100%;
            padding: 12px 35px 12px 16px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.2);
            border: none;
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
        }

        #yeokdoSearchInput:focus {
            box-shadow: 0 0 12px var(--gold-dim);
        }

        .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            display: none;
            z-index: 10;
        }

        .clear-btn:hover {
            color: var(--gold);
        }

        .search-history {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .history-badge {
            background: rgba(212, 175, 55, 0.08);
            border: none;
            color: var(--gold);
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
        }

        .history-badge:hover {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 8px var(--gold-dim);
        }

        .book-list-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(212, 175, 55, 0.6);
        }

        .book-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .book-item {
            cursor: pointer;
            font-size: 15px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            display: flex;
            flex-direction: column;
        }

        .book-item-title {
            padding: 8px 24px; /* [간격 축소] 조밀화 패치 */
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            letter-spacing: 0.5px;
            font-family: var(--font-title);
            font-weight: 500;
        }

        .arrow-icon {
            font-size: 10px;
            transition: transform 0.3s ease;
            opacity: 0.5;
        }

        .book-item.active .arrow-icon {
            transform: rotate(90deg);
            opacity: 1;
            color: var(--gold);
        }

        .book-item:hover .book-item-title {
            background: rgba(212, 175, 55, 0.1); /* [호버 미학] 금색 빛 효과 */
            color: var(--gold-premium);
        }

        .book-item.active {
            color: var(--gold);
            border-left-color: var(--gold);
        }

        .book-item.active .book-item-title {
            background: var(--gold-dim);
            font-weight: 600;
            color: var(--gold);
        }

        .toc-container {
            display: none;
            flex-direction: column;
            padding: 10px 24px 15px 34px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .book-item.active .toc-container {
            display: flex;
        }

        .toc-item {
            font-size: 13px;
            color: var(--text-secondary);
            padding: 4px 12px; /* [간격 축소] */
            margin-bottom: 1px;
            border-radius: 6px;
            transition: all 0.2s ease;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
            border-left: 1px solid var(--glass-border);
            font-family: var(--font-title);
        }

        .toc-item:hover {
            background: rgba(212, 175, 55, 0.08);
            color: var(--gold-premium);
            border-left-color: var(--gold);
        }

        .toc-item.level-2 {
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 8px;
            border-left-color: rgba(212, 175, 55, 0.5);
        }

        .toc-item.level-3 {
            padding-left: 20px;
        }

        .main-view {
            flex-grow: 1;
            overflow: hidden;
            position: relative;
        }

        .main-header {
            padding: 30px 40px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .main-header h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            color: var(--gold);
            font-family: var(--font-title);
        }

        .content-area {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            scroll-behavior: smooth;
            height: calc(100% - 90px);
            box-sizing: border-box;
        }

        .welcome-message {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 100px;
            font-size: 18px;
            line-height: 1.8;
        }

        .welcome-message strong {
            color: var(--gold);
        }

        .chapter-header {
            font-size: 22px;
            color: var(--text-primary);
            margin: 40px 0 20px;
            font-weight: 600;
            border-bottom: 1px dashed var(--glass-border);
            padding-bottom: 10px;
        }

        .verse-header {
            font-size: 16px;
            color: var(--gold);
            margin: 30px 0 10px;
            font-weight: 600;
        }

        .verse-text {
            font-size: 1.1rem;
            line-height: 1.75;
            color: var(--text-secondary);
            margin-bottom: 15px;
            padding-left: 15px;
            border-left: 2px solid var(--glass-border);
            font-family: var(--font-main);
            letter-spacing: -0.01em;
        }

        .copy-icon {
            display: inline-block;
            margin-left: 10px;
            cursor: pointer;
            opacity: 0.2;
            transition: opacity 0.2s;
            font-size: 15px;
        }

        .verse-text:hover .copy-icon {
            opacity: 1;
        }

        .floating-toggle-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--bg-accent);
            border: 1px solid var(--glass-border);
            color: var(--gold);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: var(--glass-shadow);
            transition: all 0.3s ease;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .floating-toggle-btn:hover {
            background: var(--gold-dim);
            border-color: var(--gold);
            transform: translateY(-3px);
        }

        .search-result-book {
            font-size: 18px;
            color: var(--gold);
            margin: 40px 0 15px;
            font-weight: 700;
            border-bottom: 1px solid var(--gold-dim);
            padding-bottom: 8px;
        }

        .target-highlight {
            background-color: rgba(212, 175, 55, 0.15) !important;
            border-left: 4px solid var(--gold) !important;
            padding: 10px 15px !important;
            border-radius: 8px !important;
            color: var(--text-primary) !important;
            font-weight: 600 !important;
            transition: all 0.5s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin: 15px 0 !important;
        }

        .search-result-item:hover {
            background: rgba(255, 255, 255, 0.05) !important;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(212, 175, 55, 0.9);
            color: var(--bg-dark);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: bold;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, 10px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 0;
                gap: 0;
            }

            #sidebar {
                position: fixed;
                left: -300px;
                top: 0;
                bottom: 0;
                width: 300px;
                z-index: 1000;
                border-radius: 0;
                transition: left 0.3s ease;
            }

            #sidebar.show {
                left: 0;
            }

            .main-view {
                border-radius: 0;
                height: 100vh;
                width: 100vw;
            }

            .main-header {
                padding: 15px 20px;
            }

            .main-header h2 {
                font-size: 20px;
            }

            .content-area {
                padding: 20px;
                height: calc(100% - 60px);
            }

            .sidebar-header {
                padding: 40px 20px 20px;
            }

            .sidebar-header h1 {
                font-size: 22px;
            }

            .book-item-title {
                padding: 16px 24px;
                font-size: 16px;
            }

            .toc-item {
                padding: 12px 16px;
                font-size: 14px;
                margin-bottom: 4px;
            }

            .floating-toggle-btn {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
            }

            .welcome-message {
                margin-top: 60px;
                font-size: 16px;
            }

            .verse-text {
                font-size: 16px;
                white-space: pre-wrap;
                font-family: 'Noto Serif KR', serif;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">

                <button id="globalSearchBtn" class="global-search-btn">전체 경전 검색</button>

                    <input type="text" id="searchInput" placeholder="성구/초성 검색 (예: ㅈㅅ)">

                    <div class="search-input-wrapper">
                        <input type="text" id="yeokdoSearchInput" placeholder="역경 전용 검색...">

                    </div>

                <div id="welcomeScreen" class="welcome-message">

                    가장 최신의 성구 검색 엔진과<br>
                    역경(易經) 라이브러리를 경험해 보세요.

                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>

    <div id="toast"></div>

    <script src="data.js" charset="utf-8"></script>
    <script src="data_md.js" charset="utf-8"></script>
    <script>
        console.log("🚀 성구 데이터를 로컬 자바스크립트로 초기화합니다...");
        let BIBLE_DATA = {};
        let BIBLE_LIST = [];
        let YEOKDO_DATA = {};
        let YEOKDO_LIST = [];
        let isGlobalSearch = false;

        const HISTORY_KEY = 'hyunmu_pc_search_history';

        document.addEventListener("DOMContentLoaded", () => {
            if (typeof window.BIBLE_DATA_RAW !== 'undefined') {
                BIBLE_DATA = window.BIBLE_DATA_RAW;
                BIBLE_LIST = Object.keys(BIBLE_DATA).sort();
                if (typeof yeokdoData !== 'undefined') {
                    YEOKDO_DATA = yeokdoData;
                    YEOKDO_LIST = Object.keys(YEOKDO_DATA);
                }
                
                console.log(`✅ 데이터 로드 완료: ${BIBLE_LIST.length}권의 경전 / ${YEOKDO_LIST.length}권의 역경 자료`);

                initApp();
            } else {
                console.error("데이터 초기화 실패: data.js 파일을 찾을 수 없습니다.");
                document.getElementById('currentTitle').innerHTML = "데이터 로딩 오류!";
                document.getElementById('contentArea').innerHTML = "<p>data.js 파일을 제대로 불러오지 못했습니다. 같은 폴더에 파일이 있는지 확인해주세요.</p>";
            }
        });

        const CHOSEONG = ["ㄱ", "ㄲ", "ㄴ", "ㄷ", "ㄸ", "ㄹ", "ㅁ", "ㅂ", "ㅃ", "ㅅ", "ㅆ", "ㅇ", "ㅈ", "ㅉ", "ㅊ", "ㅋ", "ㅌ", "ㅍ", "ㅎ"];

        function getChoseong(text) {
            let result = "";
            for (let i = 0; i < text.length; i++) {
                let code = text.charCodeAt(i) - 44032;
                if (code > -1 && code < 11172) {
                    result += CHOSEONG[Math.floor(code / 588)];
                } else {
                    result += text.charAt(i).toLowerCase();
                }
            }
            return result;
        }

        function cleanMarkdown(mdText) {
            let text = mdText.replace(/!\[.*?\]\(.*?\)/g, '');
            // [최종 패치] <1>, <2> 등 장 번호 태그는 삭제하지 않고 보호함
            text = text.replace(/<(?!\d+>)\/?[^>]+(>|$)/g, "");
            return text;
        }

        function debounce(func, delay) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), delay);
            };
        }

        function getSearchHistory() {
            return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
        }

        function saveSearchHistory(query) {
            if (!query) return;
            let history = getSearchHistory();
            history = [query, ...history.filter(q => q !== query)].slice(0, 5);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            renderSearchHistory();
        }

        function renderSearchHistory() {
            const history = getSearchHistory();
            const container = document.getElementById('searchHistory');
            container.innerHTML = history.map(q => `<span class="history-badge" onclick="useSearchHistory('${q}')">${q}</span>`).join('');
        }

        function useSearchHistory(query) {
            const input = document.getElementById('searchInput');
            input.value = query;
            document.getElementById('searchClearBtn').style.display = 'block';
            doBibleSearch(query, isGlobalSearch);
        }

        function getFormattedSource(elementId) {
            const el = document.getElementById(elementId);
            if (!el) return "";
            
            const bookName = window.currentBookName;
            let chapter = "", verse = "";
            
            let prev = el.previousElementSibling;
            while (prev) {
                if (prev.tagName === "H3" && !verse) verse = prev.innerText.trim();
                if (prev.tagName === "H2" && !chapter) chapter = prev.innerText.trim();
                if (chapter && verse) break;
                prev = prev.previousElementSibling;
            }

            let text = el.innerText.replace('📋', '').trim();
            let location = [];
            if (chapter) location.push(chapter);
            if (verse) location.push(verse);
            let locationStr = location.length > 0 ? " " + location.join(" ") : "";

            return `${text}\n\n『${bookName}${locationStr}』`;
        }

        function copyToClipboard(elementId) {
            const formattedText = getFormattedSource(elementId);
            navigator.clipboard.writeText(formattedText).then(() => {
                showToast("📜 출처를 포함한 구절이 복사되었습니다.");
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 1500);
        }

            const yeokdoListEl = document.getElementById('yeokdoList');

                li.dataset.book = book;

                titleDiv.className = 'book-item-title';

                    loadScripture(book);
                };

                const tocDiv = document.createElement('div');

                tocDiv.id = `toc-${book.replace(/\s+/g, '-')}`;
                li.appendChild(tocDiv);

                bookListEl.appendChild(li);
            });

            const searchInput = document.getElementById('searchInput');
            const searchClearBtn = document.getElementById('searchClearBtn');
            const yeokdoSearchInput = document.getElementById('yeokdoSearchInput');
            const yeokdoClearBtn = document.getElementById('yeokdoClearBtn');

            const handleMainSearch = debounce((query) => {
                doBibleSearch(query, isGlobalSearch);
                if(query.length >= 2) saveSearchHistory(query);
            }, 300);

            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.trim();
                yeokdoSearchInput.value = '';
                yeokdoClearBtn.style.display = 'none';
                searchClearBtn.style.display = query ? 'block' : 'none';
                handleMainSearch(query);
            });

            searchClearBtn.addEventListener('click', () => {
                searchInput.value = '';
                searchClearBtn.style.display = 'none';
                doBibleSearch('', isGlobalSearch);
            });

            const handleYeokdoSearch = debounce((query) => {
                doYeokdoSearch(query);
            }, 300);

            yeokdoSearchInput.addEventListener('input', (e) => {
                const query = e.target.value.trim();
                searchInput.value = '';
                searchClearBtn.style.display = 'none';
                yeokdoClearBtn.style.display = query ? 'block' : 'none';
                handleYeokdoSearch(query);
            });

            yeokdoClearBtn.addEventListener('click', () => {
                yeokdoSearchInput.value = '';
                yeokdoClearBtn.style.display = 'none';
                doYeokdoSearch('');
            });

            document.getElementById('globalSearchBtn').addEventListener('click', toggleGlobalSearch);
            document.getElementById('tocToggleBtn').addEventListener('click', () => {
                const sidebar = document.getElementById('sidebar');
                if (window.innerWidth <= 768) {
                    sidebar.classList.toggle('show');
                } else {
                    sidebar.classList.toggle('collapsed');
                }
            });

            renderSearchHistory();

            // Load last read state
            const lastBook = localStorage.getItem('hyunmu_last_read_book');
            const lastScroll = parseInt(localStorage.getItem('hyunmu_last_read_scroll') || '0');
            
            if (lastBook && YEOKDO_LIST.includes(lastBook)) {
                loadYeokdo(lastBook);
            } else if (lastBook && BIBLE_LIST.includes(lastBook)) {
                loadScripture(lastBook);
            } else if (BIBLE_LIST.length > 0) {
                loadScripture(BIBLE_LIST[0]);
            }

            setTimeout(() => {
                document.getElementById('contentArea').scrollTop = lastScroll;
            }, 200);

            // Save scroll state
            document.getElementById('contentArea').addEventListener('scroll', debounce((e) => {
                const searchArea = document.getElementById('searchResultsArea');
                if (window.currentBookName && (!searchArea.style.display || searchArea.style.display === 'none')) {
                    localStorage.setItem('hyunmu_last_read_scroll', e.target.scrollTop);
                }

        function buildTOC(text) {
            const lines = text.split('\n');
            let tocHtml = '';
            let chapterIndex = 0;
            let verseIndex = 0;

            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('### ')) {
                    const title = line.replace('###', '').trim();
                    const id = `toc-3-${chapterIndex}-${verseIndex++}`;
                    tocHtml += `<div class="toc-item level-3" onclick="scrollToId('${id}')">${title}</div>`;
                } else if (line.startsWith('## ')) {
                    const title = line.replace('##', '').trim();
                    verseIndex = 0;
                    const id = `toc-2-${++chapterIndex}`;
                    tocHtml += `<div class="toc-item level-2" onclick="scrollToId('${id}')">${title}</div>`;
                }
            }
            return tocHtml;
        }

        function scrollToId(id) {
            const el = document.getElementById(id);
            if (el) {
                const container = document.getElementById('contentArea');
                container.scrollTo({
                    top: el.offsetTop - container.offsetTop - 20,
                    behavior: 'smooth'
                });

                if (window.innerWidth <= 768) {
                    document.getElementById('sidebar').classList.remove('show');
                }
            }
        }

        function toggleGlobalSearch() {
            isGlobalSearch = !isGlobalSearch;
            const btn = document.getElementById('globalSearchBtn');
            const searchInput = document.getElementById('searchInput');
            const searchArea = document.getElementById('searchResultsArea');

            if (isGlobalSearch) {
                btn.classList.add('active');
                btn.textContent = '전체 검색 모드 (해제하려면 클릭)';
                searchInput.placeholder = "전체 경전에서 검색...";

                document.querySelectorAll('.book-item').forEach(el => el.classList.remove('active'));

                document.getElementById('currentTitle').innerHTML = `통합 검색 <span style="font-size:12px; color:var(--text-secondary); margin-left:10px;">(전체 경전 대상)</span>`;
                
                if (searchInput.value.trim()) {
                    doBibleSearch(searchInput.value.trim(), true);
                } else {
                    document.getElementById('welcomeScreen').style.display = 'none';
                    document.getElementById('readerContent').style.display = 'none';
                    searchArea.style.display = 'block';
                    searchArea.innerHTML = '<div class="welcome-message">검색어를 입력하시면 전체 경전에서 결과를 찾아드립니다.</div>';
                }
                searchInput.focus();
            } else {
                btn.classList.remove('active');
                btn.textContent = '전체 경전 검색';
                searchInput.placeholder = "성구/초성 검색 (예: ㅈㅅ)";

                const lastBook = window.currentBookName || BIBLE_LIST[0];
                if (searchInput.value.trim()) {
                    doBibleSearch(searchInput.value.trim(), false);
                } else {
                    if (lastBook) loadScripture(lastBook);
                }
            }
        }

        function doBibleSearch(queryStr, isGlobal) {
            const query = queryStr.toLowerCase().replace(/\s+/g, '');
            const searchArea = document.getElementById('searchResultsArea');
            
            if (!query) {
                if (isGlobal) {
                    document.getElementById('welcomeScreen').style.display = 'none';
                    document.getElementById('readerContent').style.display = 'none';
                    searchArea.style.display = 'block';
                    searchArea.innerHTML = '<div class="welcome-message">검색어를 입력하시면 전체 경전에서 결과를 찾아드립니다.</div>';
                } else {
                    const activeBook = document.querySelector('.book-item.active');
                    if (activeBook && window.currentBookText) {
                        renderContent(window.currentBookText, window.currentBookName);
                    }
                }
                return;
            }

            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('readerContent').style.display = 'none';
            searchArea.style.display = 'block';

            let resultsHtml = '';
            let totalMatches = 0;
            
            const targetBooks = isGlobal ? BIBLE_LIST : (window.currentBookName ? [window.currentBookName] : BIBLE_LIST);

            targetBooks.forEach(bookName => {
                const rawContent = BIBLE_DATA[bookName];
                if(!rawContent) return;
                const cleanContent = cleanMarkdown(rawContent);
                const lines = cleanContent.split('\n');
                
                let currentChapter = "";
                let currentVerse = "";
                let matchesInBook = 0;
                let bookHtml = '';
                const isAnwonjeon = bookName.includes('안원전');
                const seenKeys = new Set();

                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i].trim();
                    if (!line) continue;
                    
                    if (isAnwonjeon && line.includes("天地開闢經 第一篇 辛丑年")) {
                        line = line.replace("天地開闢經 第一篇 辛丑年", "천지개벽경 제1편 신축년");
                        currentChapter = "천지개벽경 제1편 신축년";
                    } else if (line.startsWith('## ')) {
                        currentChapter = line.replace('##', '').trim();
                    } else if (line.startsWith('### ')) {
                        currentVerse = line.replace('###', '').trim();
                    }
                    
                    const searchLine = line.toLowerCase().replace(/\s+/g, '');
                    if (searchLine.includes(query) || getChoseong(searchLine).includes(query)) {
                        let key = isAnwonjeon ? `${bookName}-${currentChapter}` : `${bookName}-${currentChapter}-${currentVerse}`;
                        
                        if (!seenKeys.has(key)) {
                            const displayChapter = currentChapter;
                            const displayVerse = isAnwonjeon ? "" : currentVerse;
                            const bookPrefix = isGlobal ? `<span style="color:#9aa0a6;">${bookName} &gt; </span>` : '';
                            let displayLine = line;
                            if (displayLine.startsWith('#')) displayLine = displayLine.replace(/^#+\s+/, '');
                            
                            bookHtml += `
                                <div class="search-result-item" onclick="jumpToBible('${bookName}', ${i})" style="cursor:pointer; margin-bottom:15px; padding:10px; border-radius:8px; transition:background 0.2s;">
                                    <h3 class="verse-header" style="margin-top:0;">${bookPrefix}${displayChapter} ${displayVerse ? '&gt; ' + displayVerse : ''}</h3>
                                    <p class="verse-text match" style="border-left: 3px solid var(--gold); margin-bottom:0;">${displayLine}</p>
                                </div>
                            `;
                            matchesInBook++;
                            totalMatches++;
                            seenKeys.add(key);
                        }
                    }
                }
                
                if (matchesInBook > 0) {
                    if (isGlobal) {
                        resultsHtml += `<div class="search-result-book">${bookName} (${matchesInBook}건)</div>`;
                    } else {
                        resultsHtml += `<h2 class="chapter-header">검색 결과 (${matchesInBook}건)</h2>`;
                    }
                    resultsHtml += bookHtml;
                }
            });

            if (totalMatches === 0) {
                resultsHtml = `<p class="verse-text" style="text-align:center; margin-top:50px;">'${queryStr}'에 대한 성구 결과가 없습니다.</p>`;
            } else {
                const titleText = isGlobal ? '통합 검색' : `${window.currentBookName} 검색`;
                document.getElementById('currentTitle').innerHTML = `${titleText} <span style="font-size:12px; color:var(--text-secondary); margin-left:10px;">(총 ${totalMatches}건 검색됨)</span>`;
            }
            
            searchArea.innerHTML = resultsHtml;
            document.getElementById('contentArea').scrollTop = 0;
        }

                    searchArea.style.display = 'block';

            if (isGlobalSearch) {

            YEOKDO_LIST.forEach(bookName => {
                const rawContent = YEOKDO_DATA[bookName];
                if(!rawContent) return;
                const lines = rawContent.split('\n');
                
                let currentChapter = "";
                let currentVerse = "";
                let matchesInBook = 0;
                let bookHtml = '';
                const seenKeys = new Set();

                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i].trim();
                    if (!line) continue;
                    
                    if (line.startsWith('## ')) currentChapter = line.replace('##', '').trim();
                    else if (line.startsWith('### ')) currentVerse = line.replace('###', '').trim();
                    
                    const searchLine = line.toLowerCase().replace(/\s+/g, '');
                    if (searchLine.includes(query) || getChoseong(searchLine).includes(query)) {
                        let key = `${bookName}-${currentChapter}-${currentVerse}`;
                        
                        if (!seenKeys.has(key)) {
                            const displayChapter = currentChapter;
                            const displayVerse = currentVerse;
                            let displayLine = line;
                            if (displayLine.startsWith('#')) displayLine = displayLine.replace(/^#+\s+/, '');
                            
                            bookHtml += `
                                <div class="search-result-item" onclick="jumpToYeokdo('${bookName}', ${i})" style="cursor:pointer; margin-bottom:15px; padding:10px; border-radius:8px; transition:background 0.2s;">
                                    <h3 class="verse-header" style="margin-top:0;"><span style="color:#9aa0a6;">${bookName} &gt; </span>${displayChapter} ${displayVerse ? '&gt; ' + displayVerse : ''}</h3>
                                    <p class="verse-text match" style="border-left: 3px solid var(--gold); margin-bottom:0;">${displayLine}</p>
                                </div>
                            `;
                            matchesInBook++;
                            totalMatches++;
                            seenKeys.add(key);
                        }
                    }
                }
                
                if (matchesInBook > 0) {
                    resultsHtml += `<div class="search-result-book">${bookName} (${matchesInBook}건)</div>`;
                    resultsHtml += bookHtml;
                }
            });

            if (totalMatches === 0) {
                resultsHtml = `<p class="verse-text" style="text-align:center; margin-top:50px;">'${queryStr}'에 대한 역경 검색 결과가 없습니다.</p>`;
            } else {
                document.getElementById('currentTitle').innerHTML = `역경(易經) 검색 <span style="font-size:12px; color:var(--text-secondary); margin-left:10px;">(총 ${totalMatches}건 검색됨)</span>`;
            }
            
            searchArea.innerHTML = resultsHtml;
            document.getElementById('contentArea').scrollTop = 0;
        }

        function jumpToBible(bookName, lineIndex) {
            loadScripture(bookName, lineIndex);
        }

        function jumpToYeokdo(title, lineIndex) {
            loadYeokdo(title, lineIndex);
        }

        function loadScripture(bookName, targetLineIndex = -1) {
            const prevActive = document.querySelector('.book-item.active');
            const isSameBook = prevActive && prevActive.dataset.book === bookName;

            if (isGlobalSearch && targetLineIndex === -1) {
                toggleGlobalSearch();
            }

            if (isSameBook && targetLineIndex === -1) {
                prevActive.classList.toggle('active');
                return;
            }

            const text = BIBLE_DATA[bookName];
            if (!text) return;

            const cleanedText = cleanMarkdown(text);
            renderContent(cleanedText, bookName, targetLineIndex);

            document.querySelectorAll('.book-item').forEach(el => {
                el.classList.remove('active');
                if (el.dataset.book === bookName) {
                    el.classList.add('active');
                }
            });

            window.currentBookText = cleanedText;
            window.currentBookName = bookName;
            localStorage.setItem('hyunmu_last_read_book', bookName);

            const tocContainerId = `toc-${bookName.replace(/\s+/g, '-')}`;
            const tocContainer = document.getElementById(tocContainerId);
            if (tocContainer && !tocContainer.hasChildNodes()) {
                tocContainer.innerHTML = buildTOC(cleanedText);
            }

            const activeEl = document.querySelector('.book-item.active');
            if (activeEl && targetLineIndex === -1) {
                activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            if (window.innerWidth <= 768 && (!isSameBook || targetLineIndex !== -1)) {
                document.getElementById('sidebar').classList.remove('show');
            }
        }

        function renderContent(text, title, targetLineIndex = -1) {
            document.getElementById('currentTitle').innerHTML = `${title} <span style="font-size:12px; color:var(--text-secondary); margin-left:10px;">(로컬 데이터 모드)</span>`;

            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('searchResultsArea').style.display = 'none';
            const readerContent = document.getElementById('readerContent');
            readerContent.style.display = 'block';

            // [가독성 패치] 동곡비서의 경우 <숫자> 태그 앞에서 줄바꿈을 강제하여 문단을 분리함
            if (title === '동곡비서') {
                text = text.replace(/<(\d+)>/g, '\n<$1>');
            }

            const lines = text.split('\n');
            let htmlContent = '';

            let chapterIndex = 0;
            let verseIndex = 0;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;

                let lineId = `bible-line-${i}`;
                let isTarget = (i === targetLineIndex);
                let targetClass = isTarget ? ' target-highlight' : '';
                let displayLine = line;

                if (line.startsWith('### ')) {
                    const cleanTitle = line.replace('###', '').trim();
                    const id = `toc-3-${chapterIndex}-${verseIndex++}`;
                    htmlContent += `<h3 id="${id}" class="verse-header${targetClass}" data-line="${lineId}">${cleanTitle}</h3>`;
                } else if (line.startsWith('## ')) {
                    const cleanTitle = line.replace('##', '').trim();
                    verseIndex = 0;
                    const id = `toc-2-${++chapterIndex}`;
                    htmlContent += `<h2 id="${id}" class="chapter-header${targetClass}" data-line="${lineId}">${cleanTitle}</h2>`;
                } else if (line.startsWith('# ')) {
                } else {
                    // [동곡비서] 번호 분리 렌더링 (PC 버전 가독성 최적화)
                    if (title === '동곡비서') {
                        const match = line.match(/^<(\d+)>(.*)/);
                        if (match) {
                            displayLine = `<span class="line-number" style="color:#D4AF37; font-weight:bold; margin-right:12px;">${match[1]}.</span>${match[2].trim()}`;
                        }
                    }
                    htmlContent += `<p id="${lineId}" class="verse-text${targetClass}">${displayLine} <span class="copy-icon" onclick="copyToClipboard('${lineId}')" title="출처와 함께 복사">📋</span></p>`;
                }
            }

            readerContent.innerHTML = htmlContent;

            if (targetLineIndex !== -1) {
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        const targetEl = document.getElementById(`bible-line-${targetLineIndex}`) || document.querySelector(`[data-line="bible-line-${targetLineIndex}"]`);
                        if (targetEl) {
                            targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    });
                });
            } else {
                document.getElementById('contentArea').scrollTop = 0;
            }
        }

        function loadYeokdo(title, targetLineIndex = -1) {
            const prevActive = document.querySelector('.book-item.active');
            const isSameBook = prevActive && prevActive.dataset.book === title;

            if (isGlobalSearch) {
                toggleGlobalSearch();
            }

            if (isSameBook && targetLineIndex === -1) {
                prevActive.classList.toggle('active');
                return;
            }

            const text = YEOKDO_DATA[title];
            if (!text) return;

            window.currentBookText = text;
            window.currentBookName = title;
            localStorage.setItem('hyunmu_last_read_book', title);
            
            isGlobalSearch = false;
            document.getElementById('globalSearchBtn').classList.remove('active');

            document.querySelectorAll('.book-item').forEach(el => el.classList.remove('active'));
            const activeItem = document.querySelector(`.book-item[data-book="${title}"]`);
            if (activeItem) activeItem.classList.add('active');

            document.getElementById('currentTitle').innerText = title;
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('searchResultsArea').style.display = 'none';
            const readerContent = document.getElementById('readerContent');
            readerContent.style.display = 'block';
            
            readerContent.innerHTML = formatMD(text, targetLineIndex);
            
            const tocEl = document.getElementById(`toc-yeokdo-${title.replace(/\s+/g, '-')}`);
            if (tocEl) {
                document.querySelectorAll('.toc-container').forEach(el => el.innerHTML = '');
                tocEl.innerHTML = buildTOC(text);
            }

            if (targetLineIndex !== -1) {
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        const targetEl = document.getElementById(`yeokdo-line-${targetLineIndex}`) || document.querySelector(`[data-line="yeokdo-line-${targetLineIndex}"]`);
                        if (targetEl) {
                            targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    });
                });
            } else {
                document.getElementById('contentArea').scrollTop = 0;
            }

            if (window.innerWidth <= 768 && (!isSameBook || targetLineIndex !== -1)) document.getElementById('sidebar').classList.remove('show');
        }

        function formatMD(text, targetLineIndex = -1) {
            const lines = text.split('\n');
            let html = '';
            let chapterIndex = 0;
            let verseIndex = 0;

            for (let i = 0; i < lines.length; i++) {
                const trimmed = lines[i].trim();
                let isTarget = (i === targetLineIndex);
                let targetClass = isTarget ? ' target-highlight' : '';
                let lineId = `yeokdo-line-${i}`;

                if (trimmed.startsWith('### ')) {
                    const title = trimmed.replace('###', '').trim();
                    const id = `toc-3-${chapterIndex}-${verseIndex++}`;
                    html += `<h3 id="${id}" class="verse-header${targetClass}" data-line="${lineId}">${title}</h3>\n`;
                } else if (trimmed.startsWith('## ')) {
                    const title = trimmed.replace('##', '').trim();
                    verseIndex = 0;
                    const id = `toc-2-${++chapterIndex}`;
                    html += `<h2 id="${id}" class="chapter-header${targetClass}" data-line="${lineId}">${title}</h2>\n`;
                } else if (trimmed.startsWith('# ')) {
                    const title = trimmed.replace('#', '').trim();
                    html += `<h1 class="book-title${targetClass}" data-line="${lineId}">${title}</h1>\n`;
                } else {
                    if (trimmed) {
                        html += `<p id="${lineId}" class="verse-text${targetClass}">${lines[i]} <span class="copy-icon" onclick="copyToClipboard('${lineId}')" title="출처와 함께 복사">📋</span></p>\n`;
                    } else {
                        html += `\n`;
                    }
                }
            }
            return html;
        }
    </script>
</body>

</html>
